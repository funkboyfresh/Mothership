<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mission Control V12.0</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/delaunator@5.0.0/delaunator.min.js"></script>
    <script src="https://unpkg.com/d3-delaunay@6.0.2/dist/d3-delaunay.min.js"></script>
</head>
<body>
    <div id="app">
        <div id="level-up-overlay">
            <h1 style="font-size: 3rem; color: var(--bg); text-align: center; letter-spacing: 5px; margin:0;">HYPER-DRIVE<br>ENGAGED</h1>
            <p style="color: var(--bg); font-weight: bold; letter-spacing: 2px;">PILOT LEVEL UP</p>
        </div>

        <div class="grid-bg"></div>
        <div class="dense-starfield" id="global-starfield"></div>

        <div id="hud">
            <div class="hud-top-row">
                <span class="hud-level-text" id="hud-level">PILOT LEVEL 1</span>
                <span class="hud-energy-text" id="hud-energy-readout">CAPACITOR 0%</span>
            </div>
            <div class="capacitor-container">
                <div class="capacitor-fill" id="hud-capacitor-bar" style="width: 0%;"></div>
                <div class="capacitor-segments"></div>
            </div>
        </div>

        <div id="nav-bar">
            <div id="breadcrumb" class="breadcrumb">GALAXY</div>
            <div id="zoom-out" class="zoom-btn" style="visibility:hidden" onclick="zoomOut()">[ ZOOM OUT ]</div>
        </div>
        
        <div id="view-container" class="view"></div>
        
        <div id="control-footer" class="control-footer" style="display:none"></div>
    </div>

    <div id="task-modal-overlay" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header" id="modal-header-text">TARGET INITIALIZATION</div>
            <div class="input-group">
                <span class="input-label">Target Designation</span>
                <input type="text" id="modal-task-name" class="modal-input" placeholder="Enter target name..." autocomplete="off">
            </div>
            <div class="input-group" id="modal-horizon-group">
                <span class="input-label">Mission Parameters (Orbit)</span>
                <select id="modal-horizon-select" class="modal-input">
                    <option value="IMMINENT">IMMINENT (0 - 7 Days)</option>
                    <option value="HORIZON">HORIZON (8 - 14 Days)</option>
                    <option value="TRAJECTORY">TRAJECTORY (> 14 Days / Undefined)</option>
                </select>
            </div>
            <div class="input-group">
                <span class="input-label">Temporal Deadline (Optional)</span>
                <input type="date" id="modal-task-date" class="modal-input">
            </div>
            <span class="input-label">Sub-Routines (Max 10)</span>
            <div class="subtasks-container" id="modal-subtasks-list"></div>
            <div class="add-btn-bar" id="modal-add-btn" onclick="addModalSubtask()">+</div>
            <div class="modal-actions">
                <button class="mod-btn" style="flex:1" onclick="closeTaskModal()">CANCEL</button>
                <button class="success-btn" id="modal-save-btn" style="flex:1; padding: 10px; font-size:0.8rem; border-radius: 2px;" onclick="saveTaskModal()">LOCK TARGET</button>
            </div>
        </div>
    </div>

    <div id="sector-modal-overlay" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">TERRITORIAL GEOMETRY MAP</div>
            <div class="subtasks-container" id="sector-edit-list"></div>
            <div class="add-btn-bar" onclick="addNewSector()">+ ADD SECTOR</div>
            <div class="modal-actions">
                <button class="mod-btn" style="flex:1" onclick="closeSectorModal()">CANCEL</button>
                <button class="success-btn" style="flex:1; padding: 10px; font-size:0.8rem; border-radius: 2px;" onclick="saveSectorModal()">INITIALIZE MAP</button>
            </div>
        </div>
    </div>

    <script src="engine.js"></script>
</body>
</html>
