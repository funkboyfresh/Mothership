<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mission Control V3.2</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --bg: #1a1614; --accent: #d4a373; --text: #fefae0; --border: #4a4238; --now: #bc6c25; --danger: #ae2012; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        #app { display: flex; flex-direction: column; height: 100%; }
        #hud { padding: 15px; background: rgba(0,0,0,0.4); border-bottom: 1px solid var(--border); text-align: center; font-size: 0.7rem; letter-spacing: 2px; color: var(--accent); }
        #nav-bar { display: flex; justify-content: space-between; padding: 10px; min-height: 24px; align-items: center; }
        .breadcrumb { font-size: 0.6rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        .zoom-btn { font-size: 0.6rem; border: 1px solid var(--accent); padding: 4px 10px; border-radius: 2px; cursor: pointer; }
        .view { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; overflow-y: auto; padding: 20px; flex-direction: column; }
        
        .view-level-title { font-size: 0.7rem; letter-spacing: 3px; color: var(--accent); margin-bottom: 5px; opacity: 0.8; }
        .view-main-title { font-size: 1.4rem; margin-top: 0; margin-bottom: 20px; font-weight: 300; text-transform: uppercase; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 15px; width: 100%; height: 60%; }
        .sector-box { border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; }
        .planet { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--accent); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold; text-align: center; }

        .rings-container { display: flex; flex-direction: column; gap: 15px; width: 100%; }
        .ring-item { padding: 20px; border: 1px solid var(--border); text-align: center; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
        .ring-item:active { background: rgba(212, 163, 115, 0.1); }
        .mission-name { flex: 1; text-align: left; }
        .action-btns { display: flex; gap: 10px; font-size: 0.6rem; }
        .btn-sm { border: 1px solid var(--border); padding: 4px 8px; border-radius: 2px; }

        .target-lock { width: 100%; text-align: center; }
        .sub-task-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid var(--border); text-align: left; }
        .checkbox { width: 20px; height: 20px; border: 1px solid var(--accent); margin-right: 15px; flex-shrink: 0; }
        .checked { background: var(--accent); }
        .strikethrough { text-decoration: line-through; opacity: 0.5; }
        .success-btn { width: 100%; margin-top: 20px; padding: 20px; background: var(--accent); color: var(--bg); border: none; font-weight: bold; font-size: 0.9rem; }
        .mod-btn { margin-top: 15px; font-size: 0.6rem; color: var(--accent); text-decoration: underline; background: none; border: none; }
        .disabled { opacity: 0.3; pointer-events: none; }
    </style>
</head>
<body>
    <div id="app">
        <div id="hud">NAVIGATION SYSTEMS ONLINE</div>
        <div id="nav-bar">
            <div id="breadcrumb" class="breadcrumb"></div>
            <div id="zoom-out" class="zoom-btn" style="display:none" onclick="zoomOut()">[ ZOOM OUT ]</div>
        </div>
        <div id="view-container" class="view"></div>
    </div>

    <script>
        let state = {
            level: 1, sector: null, horizon: null, activeMission: null,
            missions: JSON.parse(localStorage.getItem('missions')) || {
                CAREER: { NOW: [], SOON: [], FUTURE: [] },
                FINANCIAL: { NOW: [], SOON: [], FUTURE: [] },
                PERSONAL: { NOW: [], SOON: [], FUTURE: [] },
                HEALTH: { NOW: [], SOON: [], FUTURE: [] }
            }
        };

        function save() { localStorage.setItem('missions', JSON.stringify(state.missions)); }

        function render() {
            const container = document.getElementById('view-container');
            const zoomBtn = document.getElementById('zoom-out');
            const bread = document.getElementById('breadcrumb');
            container.innerHTML = '';
            
            zoomBtn.style.display = state.level > 1 ? 'block' : 'none';
            bread.innerText = `${state.sector || ''} ${state.horizon ? '> ' + state.horizon : ''}`;

            if (state.level === 1) {
                container.innerHTML = `<div class="view-level-title">LEVEL 1</div><h1 class="view-main-title">Sector Map</h1>`;
                const grid = document.createElement('div');
                grid.className = 'grid';
                Object.keys(state.missions).forEach(s => {
                    const box = document.createElement('div');
                    box.className = 'sector-box';
                    box.innerHTML = `<div class="planet" onclick="selectSector('${s}')">${s}</div>`;
                    grid.appendChild(box);
                });
                container.appendChild(grid);
            } 
            else if (state.level === 2) {
                container.innerHTML = `<div class="view-level-title">LEVEL 2 // ${state.sector}</div><h1 class="view-main-title">Planetary Map</h1>`;
                const rings = document.createElement('div');
                rings.className = 'rings-container';
                ['NOW', 'SOON', 'FUTURE'].forEach(h => {
                    const r = document.createElement('div');
                    r.className = 'ring-item';
                    r.innerHTML = `<div style="width:100%">${h}</div>`;
                    r.onclick = () => { state.horizon = h; state.level = 3; render(); };
                    rings.appendChild(r);
                });
                container.appendChild(rings);
            }
            else if (state.level === 3) {
                container.innerHTML = `<div class="view-level-title">LEVEL 3 // ${state.horizon}</div><h1 class="view-main-title">Constellation Map</h1>`;
                const list = state.missions[state.sector][state.horizon] || [];
                const rings = document.createElement('div');
                rings.className = 'rings-container';
                list.forEach(m => {
                    rings.innerHTML += `<div class="ring-item">
                        <span class="mission-name" onclick="selectMission(${m.id})">${m.name}</span>
                        <div class="action-btns">
                            <span class="btn-sm" onclick="editMission(${m.id})">EDIT</span>
                            <span class="btn-sm" onclick="deleteMission(${m.id})" style="color:var(--danger)">X</span>
                        </div>
                    </div>`;
                });
                container.appendChild(rings);
                container.innerHTML += `<div style="margin-top:20px; text-align:center"><button class="zoom-btn" onclick="addMission()">+ ADD STAR</button></div>`;
            }
            else if (state.level === 4) {
                const m = state.activeMission;
                const allDone = m.subs.length > 0 && m.subs.every(s => s.c);
                container.innerHTML = `
                    <div class="target-lock">
                        <div class="view-level-title">LEVEL 4 // ACTIVE TARGET</div>
                        <h1 class="view-main-title">Ship Orbit</h1>
                        <h2 style="color:var(--accent); font-size: 1.1rem; margin-bottom: 25px;">${m.name}</h2>
                        ${m.subs.map((s, i) => `
                            <div class="sub-task-item" onclick="toggleSub(${i})">
                                <div class="checkbox ${s.c ? 'checked' : ''}"></div>
                                <span class="${s.c ? 'strikethrough' : ''}">${s.t}</span>
                            </div>
                        `).join('')}
                        <button class="success-btn ${allDone ? '' : 'disabled'}" onclick="completeMission()">LOG MISSION SUCCESS & WARP</button>
                        <br><button class="mod-btn" onclick="editMission(${m.id}, true)">[ MODIFY ORBITAL PARAMETERS ]</button>
                    </div>`;
            }
        }

        function editMission(id, focusSubtasks = false) {
            const list = state.missions[state.sector][state.horizon];
            const m = list.find(x => x.id === id);
            let newName = m.name;
            if (!focusSubtasks) {
                newName = prompt("Mission Name:", m.name);
                if (newName === null) return;
            }
            const currentSubsText = m.subs.map(s => s.t).join(', ');
            const newSubsText = prompt("Modify Sub-missions (comma separated):", currentSubsText);
            if (newSubsText !== null) {
                const newNames = newSubsText.split(',').map(t => t.trim()).filter(t => t !== "");
                m.name = newName;
                m.subs = newNames.map(name => {
                    const existing = m.subs.find(s => s.t === name);
                    return existing ? existing : { t: name, c: false };
                });
            } else if (!focusSubtasks) {
                m.name = newName;
            }
            save(); render();
        }

        function selectSector(s) { state.sector = s; state.level = 2; render(); }
        function selectMission(id) {
            state.activeMission = state.missions[state.sector][state.horizon].find(m => m.id === id);
            state.level = 4; render();
        }
        function toggleSub(i) {
            state.activeMission.subs[i].c = !state.activeMission.subs[i].c;
            save(); render();
        }
        function deleteMission(id) {
            if(!confirm("Destroy star?")) return;
            state.missions[state.sector][state.horizon] = state.missions[state.sector][state.horizon].filter(m => m.id !== id);
            save(); render();
        }
        function completeMission() {
            const list = state.missions[state.sector][state.horizon];
            state.missions[state.sector][state.horizon] = list.filter(m => m.id !== state.activeMission.id);
            save(); state.level = 3; state.activeMission = null; render();
        }
        function addMission() {
            const name = prompt("Mission Name?");
            if(!name) return;
            const subsInput = prompt("Sub-missions? (comma separated)");
            const subs = subsInput ? subsInput.split(',').filter(t => t.trim() !== "").map(t => ({t: t.trim(), c: false})) : [];
            state.missions[state.sector][state.horizon].push({ id: Date.now(), name, subs });
            save(); render();
        }
        function zoomOut() { 
            if (state.level === 4) { state.activeMission = null; state.level = 3; }
            else if (state.level === 3) state.level = 2;
            else if (state.level === 2) { state.level = 1; state.sector = null; }
            render(); 
        }

        render();
    </script>
</body>
</html>
