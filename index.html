<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mission Control V5.0</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --bg: #0a0a0c; --accent: #e63946; --text: #f1f2f6; --border: #1a1a1c; --success: #52b788; --ring: #4361ee; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Urbanist', sans-serif; height: 100vh; overflow: hidden; }
        #app { display: flex; flex-direction: column; height: 100%; position: relative; }
        #hud { padding: 12px 20px; background: rgba(0,0,0,0.8); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; font-size: 0.6rem; letter-spacing: 2px; color: var(--accent); z-index: 100; }
        #nav-bar { display: flex; justify-content: space-between; padding: 10px 20px; min-height: 24px; align-items: center; z-index: 100; }
        .breadcrumb { font-size: 0.6rem; color: var(--accent); text-transform: uppercase; }
        .zoom-btn { font-size: 0.6rem; border: 1px solid var(--accent); padding: 4px 12px; border-radius: 2px; cursor: pointer; background: transparent; color: var(--accent); text-transform: uppercase; }
        
        .view { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; padding: 20px; flex-direction: column; }
        .view-label { font-size: 0.6rem; letter-spacing: 4px; color: var(--accent); margin-bottom: 5px; opacity: 0.6; }
        .view-title { font-size: 1.2rem; margin-top: 0; margin-bottom: 20px; font-weight: 300; text-transform: uppercase; text-align: center; }

        /* LEVEL 1: GRID */
        .grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 15px; width: 100%; height: 60%; z-index: 10; }
        .sector-box { border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; }
        .planet { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--accent); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold; background: var(--bg); box-shadow: 0 0 15px rgba(230, 57, 70, 0.2); }

        /* LEVEL 2: RINGS */
        .orbital-ring { position: absolute; border: 1px dashed rgba(67, 97, 238, 0.3); border-radius: 50%; pointer-events: none; }
        .ring-label { position: absolute; font-size: 0.5rem; color: var(--ring); opacity: 0.5; width: 100%; text-align: center; top: -15px; }
        .orbit-node { position: absolute; width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--text); background: var(--bg); transform: translate(-50%, -50%); display: flex; align-items: center; justify-content: center; font-size: 0.4rem; z-index: 20; cursor: pointer; }

        /* LEVEL 4: ARTEMIS ORBIT */
        .central-ship { width: 100px; height: 100px; border: 3px solid var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold; background: var(--bg); box-shadow: 0 0 30px rgba(230, 57, 70, 0.4); margin-bottom: 40px; z-index: 50; position: relative; }
        .subtask-node { position: absolute; padding: 8px 12px; border: 1px solid var(--text); border-radius: 20px; background: rgba(0,0,0,0.8); font-size: 0.55rem; white-space: nowrap; transition: all 0.3s; transform: translate(-50%, -50%); }
        .subtask-node.checked { border-color: var(--success); color: var(--success); opacity: 0.5; }

        /* SUCCESS HEXAGON */
        #success-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10,10,12,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .hexagon { width: 150px; height: 86px; background: transparent; border-left: 5px solid var(--success); border-right: 5px solid var(--success); position: relative; margin: 40px 0; display: flex; align-items: center; justify-content: center; filter: drop-shadow(0 0 15px var(--success)); }
        .hexagon::before, .hexagon::after { content: ""; position: absolute; width: 106px; height: 106px; transform: scaleY(0.5774) rotate(-45deg); background: transparent; left: 17px; }
        .hexagon::before { top: -53px; border-top: 5px solid var(--success); border-right: 5px solid var(--success); }
        .hexagon::after { bottom: -53px; border-bottom: 5px solid var(--success); border-left: 5px solid var(--success); }
        .success-text { font-size: 0.8rem; color: var(--success); letter-spacing: 5px; font-weight: bold; }

        .control-footer { padding: 20px; border-top: 1px solid var(--border); display: flex; justify-content: center; background: rgba(0,0,0,0.2); }
        .mod-btn { font-size: 0.5rem; color: var(--accent); background: none; border: 1px solid var(--accent); padding: 4px 8px; border-radius: 2px; margin: 5px; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="app">
        <div id="hud">
            <span>ORBITAL SYNC ACTIVE</span>
            <span onclick="confirmReset()" style="text-decoration:underline; opacity: 0.5">RESET DATA</span>
        </div>
        <div id="nav-bar">
            <div id="breadcrumb" class="breadcrumb">GALAXY</div>
            <div id="zoom-out" class="zoom-btn" style="visibility:hidden" onclick="zoomOut()">[ ZOOM OUT ]</div>
        </div>
        <div id="view-container" class="view"></div>
        <div id="control-footer" class="control-footer" style="display:none">
            <button class="zoom-btn" onclick="addMission()">+ ADD STAR</button>
        </div>
    </div>

    <div id="success-overlay">
        <div class="success-text">MISSION ACCOMPLISHED</div>
        <div class="hexagon"><div>SUCCEED</div></div>
        <div id="success-checklist" style="text-align: left; font-size: 0.8rem; color: var(--success); margin-top: 20px;"></div>
        <button class="success-btn" onclick="hideSuccess()" style="margin-top:40px; background: var(--success); color: var(--bg); border:none; padding: 15px 30px; font-weight:bold;">WARP TO CONSTELLATION</button>
    </div>

    <script>
        const SECTORS = ['CAREER', 'FINANCIAL', 'PERSONAL', 'HEALTH'];
        const HORIZONS = ['NOW', 'SOON', 'FUTURE'];
        let state = { level: 1, sector: null, horizon: null, activeMissionId: null, missions: JSON.parse(localStorage.getItem('missions') || '{}') };

        function ensurePath() {
            SECTORS.forEach(s => { if(!state.missions[s]) state.missions[s] = {}; HORIZONS.forEach(h => { if(!state.missions[s][h]) state.missions[s][h] = []; }); });
            localStorage.setItem('missions', JSON.stringify(state.missions));
        }

        function render() {
            const container = document.getElementById('view-container');
            const zoomBtn = document.getElementById('zoom-out');
            const bread = document.getElementById('breadcrumb');
            const footer = document.getElementById('control-footer');
            container.innerHTML = '';
            zoomBtn.style.visibility = state.level > 1 ? 'visible' : 'hidden';
            footer.style.display = state.level === 3 ? 'flex' : 'none';
            bread.innerText = `${state.sector || ''} ${state.horizon ? '> ' + state.horizon : ''}`;

            if (state.level === 1) {
                container.innerHTML = `<div class="view-label">LEVEL 1</div><h1 class="view-title">Sector Map</h1>`;
                const grid = document.createElement('div'); grid.className = 'grid';
                SECTORS.forEach(s => { grid.innerHTML += `<div class="sector-box"><div class="planet" onclick="selectSector('${s}')">${s}</div></div>`; });
                container.appendChild(grid);
            } 
            else if (state.level === 2) {
                container.innerHTML = `<div class="view-label">LEVEL 2 // ${state.sector}</div><h1 class="view-title">Planetary Map</h1><div class="planet" style="z-index:100; border-color:var(--ring)">${state.sector}</div>`;
                HORIZONS.forEach((h, i) => {
                    const radius = 100 + (i * 70);
                    const ring = document.createElement('div'); ring.className = 'orbital-ring';
                    ring.style.width = radius*2 + 'px'; ring.style.height = radius*2 + 'px';
                    ring.innerHTML = `<div class="ring-label">${h}</div>`;
                    container.appendChild(ring);
                    // Add planets to rings
                    const list = state.missions[state.sector][h];
                    list.forEach((m, idx) => {
                        const node = document.createElement('div'); node.className = 'orbit-node';
                        const angle = (idx / list.length) * 360;
                        node.style.left = `calc(50% + ${radius}px * cos(${angle}deg))`;
                        node.style.top = `calc(50% + ${radius}px * sin(${angle}deg))`;
                        node.innerText = m.name.substring(0, 5);
                        node.onclick = () => { state.horizon = h; selectMission(m.id); };
                        container.appendChild(node);
                    });
                });
            }
            else if (state.level === 3) {
                container.innerHTML = `<div class="view-label">LEVEL 3 // ${state.horizon}</div><h1 class="view-title">Constellation Map</h1>`;
                // Simple list for constellation or spatial view
                const list = state.missions[state.sector][state.horizon];
                list.forEach(m => {
                    container.innerHTML += `<div class="zoom-btn" style="margin:5px; width:80%; text-align:left" onclick="selectMission(${m.id})">${m.captured ? '✓ ' : ''}${m.name}</div>`;
                });
            }
            else if (state.level === 4) {
                const m = state.missions[state.sector][state.horizon].find(x => x.id === state.activeMissionId);
                container.innerHTML = `<div class="view-label">LEVEL 4 // ${state.sector}</div><h1 class="view-title">Ship Orbit</h1><div class="central-ship">${m.name}</div>`;
                m.subs.forEach((s, i) => {
                    const node = document.createElement('div'); node.className = `subtask-node ${s.c ? 'checked' : ''}`;
                    const angle = (i / m.subs.length) * 360;
                    node.style.left = `calc(50% + 140px * cos(${angle}deg))`;
                    node.style.top = `calc(50% + 140px * sin(${angle}deg))`;
                    node.innerHTML = `${s.c ? '✓ ' : ''}${s.t}`;
                    node.onclick = () => toggleSub(i);
                    container.appendChild(node);
                });
                container.innerHTML += `<div style="position:absolute; bottom:20px; width:100%; text-align:center;">
                    <button class="zoom-btn" onclick="completeMission()" ${m.subs.every(s => s.c) ? '' : 'disabled style="opacity:0.2"'}>LOG SUCCESS</button>
                    <button class="mod-btn" onclick="editMission(${m.id})">MODIFY</button>
                </div>`;
            }
        }

        function toggleSub(idx) { const m = state.missions[state.sector][state.horizon].find(x => x.id === state.activeMissionId); m.subs[idx].c = !m.subs[idx].c; save(); render(); }
        function selectSector(s) { state.sector = s; state.level = 2; render(); }
        function selectMission(id) { state.activeMissionId = id; state.level = 4; render(); }
        function addMission() { const n = prompt("Name?"); if(!n) return; const s = prompt("Subs? (comma separated)"); const m = { id: Date.now(), name: n, subs: s ? s.split(',').map(t=>({t:t.trim(),c:false})) : [], captured: false }; state.missions[state.sector][state.horizon].push(m); save(); render(); }
        function editMission(id) { const m = state.missions[state.sector][state.horizon].find(x=>x.id===id); const s = prompt("Modify Subs:", m.subs.map(x=>x.t).join(',')); if(s) m.subs = s.split(',').map(t=>({t:t.trim(),c:false})); save(); render(); }
        function completeMission() { 
            const m = state.missions[state.sector][state.horizon].find(x => x.id === state.activeMissionId);
            m.captured = true; save();
            document.getElementById('success-checklist').innerHTML = m.subs.map(s => `<div>✓ ${s.t}</div>`).join('');
            document.getElementById('success-overlay').style.display = 'flex';
        }
        function hideSuccess() { document.getElementById('success-overlay').style.display = 'none'; state.level = 3; state.activeMissionId = null; render(); }
        function zoomOut() { if (state.level === 4) state.level = 3; else if (state.level === 3) state.level = 2; else if (state.level === 2) { state.level = 1; state.sector = null; } render(); }
        function confirmReset() { if(confirm("Wipe all data?")) { localStorage.clear(); location.reload(); } }
        function save() { localStorage.setItem('missions', JSON.stringify(state.missions)); }

        ensurePath(); render();
    </script>
</body>
</html>
