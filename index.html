<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mission Control V6.0</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --bg: #1a1614; --accent: #d4a373; --text: #fefae0; --border: #4a4238; --captured: #606c38; --thrust: #e63946; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        #app { display: flex; flex-direction: column; height: 100%; }
        #hud { padding: 15px; background: rgba(0,0,0,0.4); border-bottom: 1px solid var(--border); text-align: center; font-size: 0.7rem; letter-spacing: 2px; color: var(--accent); }
        #nav-bar { display: flex; justify-content: space-between; padding: 10px 20px; min-height: 24px; align-items: center; z-index: 100; }
        .breadcrumb { font-size: 0.6rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        .zoom-btn { font-size: 0.6rem; border: 1px solid var(--accent); padding: 4px 12px; border-radius: 2px; cursor: pointer; background: transparent; color: var(--accent); text-transform: uppercase; }
        .view { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; padding: 20px; flex-direction: column; }
        
        /* Warp Animation */
        @keyframes warp-drive {
            0% { opacity: 0; transform: scale(0.8); filter: blur(4px); }
            100% { opacity: 1; transform: scale(1); filter: blur(0); }
        }
        .warp-transition { animation: warp-drive 0.35s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

        .view-level-title { font-size: 0.7rem; letter-spacing: 3px; color: var(--accent); margin-bottom: 5px; opacity: 0.8; z-index: 5; }
        .view-main-title { font-size: 1.4rem; margin-top: 0; margin-bottom: 20px; font-weight: 300; text-transform: uppercase; z-index: 5; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 15px; width: 100%; height: 60%; z-index: 5; }
        .sector-box { border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; }
        .planet { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--accent); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold; }

        .ring-circle { position: absolute; border-radius: 50%; border: 1px solid var(--accent); display: flex; justify-content: center; box-sizing: border-box; cursor: pointer; background: rgba(212, 163, 115, 0.05); font-size: 0.7rem; letter-spacing: 2px; color: var(--text); transition: background 0.2s; }
        .ring-circle:active { background: rgba(212, 163, 115, 0.2); }

        #constellation-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .star-container { position: absolute; display: flex; flex-direction: column; align-items: center; transform: translate(-50%, -50%); cursor: pointer; z-index: 10; }
        .star-node { width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--accent); background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 0.6rem; font-weight: bold; }
        .star-node.captured { border-color: var(--captured); box-shadow: 0 0 15px var(--captured); }
        .star-label { font-size: 0.6rem; margin-top: 6px; text-align: center; white-space: nowrap; font-weight: 300; }
        .captured-banner { font-size: 0.4rem; color: var(--captured); letter-spacing: 1px; margin-top: 2px; font-weight: bold; }

        .target-lock { width: 100%; text-align: center; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        
        /* ORBITAL MECHANICS & IGNITION */
        @keyframes orbit-spin { 100% { transform: rotate(360deg); } }
        @keyframes orbit-counter-spin { 100% { transform: rotate(-360deg); } }
        @keyframes core-ignition {
            0% { r: 12; fill: var(--bg); filter: drop-shadow(0 0 0px transparent); }
            50% { r: 20; fill: var(--thrust); filter: drop-shadow(0 0 20px var(--thrust)); }
            100% { r: 12; fill: var(--bg); filter: drop-shadow(0 0 0px transparent); }
        }

        .orbital-system { width: 340px; height: 340px; position: relative; margin: 20px auto; animation: orbit-spin 60s linear infinite; flex-shrink: 0; }
        .counter-spin { animation: orbit-counter-spin 60s linear infinite; }
        .flare-active { animation: core-ignition 0.6s ease-out; }
        
        .orbital-node-box { background: rgba(26, 22, 20, 0.95); border: 1px solid var(--border); padding: 6px 10px; border-radius: 4px; display: flex; align-items: center; gap: 8px; white-space: nowrap; max-width: 140px; transition: all 0.3s; }
        .orbital-node-box.checked { border-color: var(--captured); box-shadow: 0 0 10px rgba(96, 108, 56, 0.4); }
        .orb-check { width: 14px; height: 14px; border: 1px solid var(--accent); display:flex; align-items:center; justify-content:center; font-size: 0.5rem; flex-shrink: 0; color: var(--bg); transition: all 0.3s;}
        .orbital-node-box.checked .orb-check { background: var(--captured); border-color: var(--captured); color: var(--bg); }
        .orb-text { font-size: 0.55rem; overflow: hidden; text-overflow: ellipsis; white-space: pre-wrap; text-align: left; line-height: 1.2; }
        
        .success-btn { width: 100%; padding: 20px; background: var(--accent); color: var(--bg); border: none; font-weight: bold; font-size: 0.9rem; margin-top: auto; }
        .control-footer { padding: 20px; border-top: 1px solid var(--border); display: flex; justify-content: center; background: rgba(0,0,0,0.2); width: 100%; box-sizing: border-box; }
        .mod-btn { font-size: 0.6rem; color: var(--accent); background: none; border: 1px solid var(--accent); padding: 5px 10px; border-radius: 2px; margin: 0 5px; }
    </style>
</head>
<body>
    <div id="app">
        <div id="hud">WARP DRIVE ONLINE // THRUSTERS NOMINAL</div>
        <div id="nav-bar">
            <div id="breadcrumb" class="breadcrumb">GALAXY</div>
            <div id="zoom-out" class="zoom-btn" style="visibility:hidden" onclick="zoomOut()">[ ZOOM OUT ]</div>
        </div>
        <div id="view-container" class="view"></div>
        <div id="control-footer" class="control-footer" style="display:none">
            <button class="zoom-btn" onclick="addMission()">+ ADD STAR</button>
        </div>
    </div>

    <script>
        const SECTORS = ['CAREER', 'FINANCIAL', 'PERSONAL', 'HEALTH'];
        const HORIZONS = ['FUTURE', 'SOON', 'NOW'];

        let state = {
            level: 1, sector: null, horizon: null, activeMissionId: null,
            missions: JSON.parse(localStorage.getItem('missions')) || {}
        };

        let ignitionFlare = false;

        function ensurePath() {
            SECTORS.forEach(s => {
                if (!state.missions[s]) state.missions[s] = {};
                HORIZONS.forEach(h => {
                    if (!state.missions[s][h]) state.missions[s][h] = [];
                    state.missions[s][h].forEach(m => {
                        if (m.x === undefined) m.x = Math.floor(Math.random() * 70) + 15;
                        if (m.y === undefined) m.y = Math.floor(Math.random() * 60) + 20;
                        if (m.captured === undefined) m.captured = false;
                    });
                });
            });
            save();
        }

        function save() { localStorage.setItem('missions', JSON.stringify(state.missions)); }

        function triggerWarp() {
            const container = document.getElementById('view-container');
            container.classList.remove('warp-transition');
            void container.offsetWidth; // Trigger reflow to restart CSS animation
            container.classList.add('warp-transition');
        }

        function render() {
            const container = document.getElementById('view-container');
            const zoomBtn = document.getElementById('zoom-out');
            const bread = document.getElementById('breadcrumb');
            const footer = document.getElementById('control-footer');
            
            triggerWarp();
            container.innerHTML = '';
            
            zoomBtn.style.visibility = state.level > 1 ? 'visible' : 'hidden';
            bread.innerText = `${state.sector || 'GALAXY'} ${state.horizon ? '> ' + state.horizon : ''}`;
            footer.style.display = state.level === 3 ? 'flex' : 'none';

            if (state.level === 1) {
                container.innerHTML = `<div class="view-level-title">LEVEL 1</div><h1 class="view-main-title">Sector Map</h1>`;
                const grid = document.createElement('div'); grid.className = 'grid';
                SECTORS.forEach(s => {
                    const box = document.createElement('div'); box.className = 'sector-box';
                    box.innerHTML = `<div class="planet" onclick="selectSector('${s}')">${s}</div>`;
                    grid.appendChild(box);
                });
                container.appendChild(grid);
            } 
            else if (state.level === 2) {
                container.innerHTML = `<div class="view-level-title">LEVEL 2 // ${state.sector}</div><h1 class="view-main-title">Planetary Map</h1>`;
                const center = document.createElement('div');
                center.style.position = 'relative'; center.style.width = '280px'; center.style.height = '280px';
                center.style.display = 'flex'; center.style.alignItems = 'center'; center.style.justifyContent = 'center'; center.style.marginTop = '20px';
                const h_data = [ { id: 'FUTURE', size: 280, pt: 20 }, { id: 'SOON', size: 190, pt: 20 }, { id: 'NOW', size: 100, pt: 42 } ];
                h_data.forEach(d => {
                    const r = document.createElement('div'); r.className = 'ring-circle';
                    r.style.width = d.size + 'px'; r.style.height = d.size + 'px'; r.style.paddingTop = d.pt + 'px';
                    r.innerText = d.id; r.onclick = (e) => { e.stopPropagation(); state.horizon = d.id; state.level = 3; render(); };
                    center.appendChild(r);
                });
                container.appendChild(center);
            }
            else if (state.level === 3) {
                container.innerHTML = `<div class="view-level-title">LEVEL 3 // ${state.horizon}</div><h1 class="view-main-title">Constellation Map</h1>`;
                const missions = state.missions[state.sector][state.horizon];
                if (missions.length === 0) {
                    container.innerHTML += `<div style="margin-top: 60px; font-size: 0.8rem; color: var(--border); letter-spacing: 2px;">NO STARS DETECTED IN ${state.horizon} ORBIT</div>`;
                } else {
                    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg"); svg.id = "constellation-svg"; container.appendChild(svg);
                    missions.forEach((m, i) => {
                        const star = document.createElement('div'); star.className = 'star-container';
                        star.style.left = m.x + '%'; star.style.top = m.y + '%'; star.onclick = () => selectMission(m.id);
                        star.innerHTML = `<div class="star-node ${m.captured ? 'captured' : ''}">${i+1}</div><div class="star-label">${m.name}</div>${m.captured ? '<div class="captured-banner">STAR CAPTURED</div>' : ''}`;
                        container.appendChild(star);
                        if (i < missions.length - 1) {
                            const next = missions[i+1];
                            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                            line.setAttribute("x1", m.x + "%"); line.setAttribute("y1", m.y + "%"); line.setAttribute("x2", next.x + "%"); line.setAttribute("y2", next.y + "%");
                            line.setAttribute("stroke", "var(--border)"); line.setAttribute("stroke-width", "1"); line.setAttribute("stroke-dasharray", "4");
                            svg.appendChild(line);
                        }
                    });
                }
            }
            else if (state.level === 4) {
                const m = state.missions[state.sector][state.horizon].find(x => x.id === state.activeMissionId);
                const allDone = m.subs.length > 0 && m.subs.every(s => s.c);
                
                const coreClass = ignitionFlare ? 'flare-active' : '';
                ignitionFlare = false; // Reset ignition switch
                const coreFill = allDone ? 'var(--captured)' : 'var(--bg)';
                
                let orbHtml = `<div class="target-lock">
                    <div class="view-level-title">LEVEL 4 // ${m.captured ? 'MISSION LOG' : 'ACTIVE TARGET'}</div>
                    <h2 style="color:var(--accent); font-size: 1.1rem; margin-top: 0; margin-bottom: 5px; z-index:20;">${m.name}</h2>
                    <div class="orbital-system">
                        <svg viewBox="0 0 340 340" style="position:absolute; top:0; left:0; width:100%; height:100%; z-index: 1;">
                            <polygon points="170,110 130,220 170,190 210,220" fill="var(--bg)" stroke="var(--accent)" stroke-width="2"/>
                            <polygon points="170,190 155,230 185,230" fill="var(--bg)" stroke="var(--accent)" stroke-width="2"/>
                            <circle id="ship-core" class="${coreClass}" cx="170" cy="170" r="12" fill="${coreFill}" stroke="var(--accent)" stroke-width="2" style="transition: fill 0.5s"/>`;

                const shipParts = [
                    {x: 170, y: 110},
                    {x: 130, y: 220},
                    {x: 210, y: 220},
                    {x: 155, y: 230},
                    {x: 185, y: 230},
                    {x: 170, y: 190}
                ];

                m.subs.forEach((s, i) => {
                    const angle = (i / m.subs.length) * Math.PI * 2;
                    const radius = 100 + (i % 2) * 45;
                    const taskX = 170 + radius * Math.cos(angle);
                    const taskY = 170 + radius * Math.sin(angle);
                    const part = shipParts[i % shipParts.length];
                    const lineColor = s.c ? 'var(--captured)' : 'var(--border)';
                    const dashArray = s.c ? '0' : '4';
                    orbHtml += `<line x1="${taskX}" y1="${taskY}" x2="${part.x}" y2="${part.y}" stroke="${lineColor}" stroke-dasharray="${dashArray}" stroke-width="2" style="transition: all 0.3s;" />`;
                });

                orbHtml += `</svg>`;

                m.subs.forEach((s, i) => {
                    const angle = (i / m.subs.length) * Math.PI * 2;
                    const radius = 100 + (i % 2) * 45;
                    const taskX = 170 + radius * Math.cos(angle);
                    const taskY = 170 + radius * Math.sin(angle);

                    orbHtml += `
                        <div style="position:absolute; left:${taskX}px; top:${taskY}px; transform:translate(-50%, -50%); z-index:20; cursor:pointer;" onclick="${m.captured ? '' : `toggleSub(${i}, event)`}">
                            <div class="counter-spin orbital-node-box ${s.c ? 'checked' : ''}">
                                <div class="orb-check">${s.c ? '✓' : ''}</div>
                                <div class="orb-text ${s.c ? 'strikethrough' : ''}">${s.t}</div>
                            </div>
                        </div>`;
                });

                orbHtml += `</div>`;

                orbHtml += `<div style="width: 100%; margin-top: auto; display: flex; flex-direction: column; gap: 10px;">`;
                if (!m.captured) {
                    orbHtml += `<button class="success-btn ${allDone ? '' : 'disabled'}" onclick="completeMission()">LOG MISSION SUCCESS & WARP</button>`;
                } else {
                    orbHtml += `<div class="captured-banner" style="font-size:1rem; padding: 15px;">MISSION ARCHIVED</div>`;
                }
                
                orbHtml += `
                    <div style="display:flex; justify-content:center; margin-bottom: 10px;">
                        <button class="mod-btn" onclick="editMission(${m.id}, event, true)">EDIT SUB-TASKS</button>
                        <button class="mod-btn" onclick="editMission(${m.id}, event, false)">RENAME</button>
                        <button class="mod-btn" onclick="deleteMission(${m.id}, event)" style="color:red; border-color:red">DESTROY</button>
                    </div>
                </div></div>`;

                container.innerHTML = orbHtml;
            }
        }

        function addMission() {
            const name = prompt("Mission Name?"); if(!name) return;
            const subsInput = prompt("Sub-missions? (comma separated)");
            const subs = subsInput ? subsInput.split(',').filter(t => t.trim() !== "").map(t => ({t: t.trim(), c: false})) : [];
            const x = Math.floor(Math.random() * 70) + 15;
            const y = Math.floor(Math.random() * 50) + 25;
            state.missions[state.sector][state.horizon].push({ id: Date.now(), name, subs, x, y, captured: false });
            save(); render();
        }

        function selectSector(s) { state.sector = s; state.level = 2; render(); }
        function selectMission(id) { state.activeMissionId = id; state.level = 4; render(); }
        
        function toggleSub(index, e) {
            e.stopPropagation();
            const m = state.missions[state.sector][state.horizon].find(x => x.id === state.activeMissionId);
            m.subs[index].c = !m.subs[index].c;
            if(m.subs[index].c) ignitionFlare = true; // Trigger plume if checking a box
            save(); render();
        }
        
        function completeMission() {
            const m = state.missions[state.sector][state.horizon].find(x => x.id === state.activeMissionId);
            m.captured = true;
            save(); state.level = 3; state.activeMissionId = null; render();
        }
        
        function editMission(id, e, focusSub) {
            if(e) e.stopPropagation();
            const m = state.missions[state.sector][state.horizon].find(x => x.id === id);
            if(focusSub) {
                const current = m.subs.map(s => s.t).join(', ');
                const res = prompt("Modify Sub-missions:", current);
                if(res !== null) {
                    const names = res.split(',').map(t => t.trim()).filter(t => t !== "");
                    m.subs = names.map(n => {
                        const ex = m.subs.find(s => s.t === n);
                        return ex ? {t: ex.t, c: ex.c} : {t: n, c: false};
                    });
                }
            } else {
                const res = prompt("Rename Mission:", m.name);
                if(res) m.name = res;
            }
            save(); render();
        }
        
        function deleteMission(id, e) {
            if(e) e.stopPropagation();
            if(confirm("Destroy this target permanently?")) {
                state.missions[state.sector][state.horizon] = state.missions[state.sector][state.horizon].filter(m => m.id !== id);
                save(); state.level = 3; state.activeMissionId = null; render();
            }
        }
        
        function zoomOut() { 
            if (state.level === 4) { state.activeMissionId = null; state.level = 3; }
            else if (state.level === 3) { state.level = 2; state.horizon = null; } 
            else if (state.level === 2) { state.level = 1; state.sector = null; }
            render(); 
        }

        ensurePath();
        render();
    </script>
</body>
</html>
