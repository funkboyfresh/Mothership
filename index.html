<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mission Control V5.4</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --bg: #0d0d12; --accent: #8b9bb4; --text: #e0e5ec; --border: #2a2d3d; --success: #4ade80; --ring: #3b4252; --active: #f1f2f6; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; height: 100vh; overflow: hidden; }
        #app { display: flex; flex-direction: column; height: 100%; position: relative; }
        #hud { padding: 12px 20px; background: rgba(0,0,0,0.5); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; font-size: 0.6rem; letter-spacing: 2px; color: var(--accent); z-index: 100; }
        #nav-bar { display: flex; justify-content: space-between; padding: 15px 20px; align-items: center; z-index: 100; }
        .breadcrumb { font-size: 0.7rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        .zoom-btn { font-size: 0.6rem; border: 1px solid var(--accent); padding: 6px 12px; border-radius: 4px; cursor: pointer; background: transparent; color: var(--accent); text-transform: uppercase; letter-spacing: 1px;}
        .view { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; flex-direction: column; width: 100%; }
        .view-label { font-size: 0.7rem; letter-spacing: 4px; color: var(--accent); margin-bottom: 8px; position: absolute; top: 20px; width: 100%; text-align: center; z-index: 10; }
        .view-title { font-size: 1.5rem; margin-top: 0; margin-bottom: 20px; font-weight: 300; text-transform: uppercase; text-align: center; position: absolute; top: 40px; width: 100%; z-index: 10; color: var(--active); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 20px; width: 85%; height: 50%; z-index: 10; margin-top: 80px; }
        .sector-box { border: 1px solid var(--border); border-radius: 8px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.02); }
        .planet { width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--accent); display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold; background: var(--bg); box-shadow: 0 0 20px rgba(139, 155, 180, 0.1); cursor: pointer; color: var(--active); }
        .spatial-container { position: relative; width: 320px; height: 320px; display: flex; align-items: center; justify-content: center; margin-top: 60px; }
        .constellation-field { position: relative; width: 100%; height: 60%; margin-top: 60px; }
        .orbital-ring { position: absolute; border: 1px dashed var(--ring); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        .ring-label { position: absolute; font-size: 0.6rem; color: var(--bg); top: -10px; left: 50%; transform: translateX(-50%); background: var(--accent); padding: 4px 12px; border-radius: 12px; cursor: pointer; pointer-events: auto; font-weight: bold; letter-spacing: 1px; transition: all 0.2s; box-shadow: 0 0 10px rgba(139, 155, 180, 0.2); }
        .ring-label:active { transform: translateX(-50%) scale(0.95); opacity: 0.8; }
        .orbit-node { position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transform: translate(-50%, -50%); z-index: 20; }
        .node-circle { width: 24px; height: 24px; border-radius: 50%; background: var(--border); border: 2px solid var(--accent); z-index: 2; transition: all 0.2s; display: flex; align-items: center; justify-content: center; font-size: 0.5rem; }
        .node-circle.completed { background: var(--success); border-color: var(--success); color: var(--bg); }
        .node-circle.completed::after { content: '✓'; font-weight: bold; }
        .node-label { font-size: 0.6rem; text-align: center; width: 80px; margin-top: 6px; color: var(--text); pointer-events: none; }
        .central-ship { width: 110px; height: 110px; border-radius: 50%; border: 2px solid var(--accent); background: var(--bg); box-shadow: 0 0 30px rgba(139, 155, 180, 0.15); display: flex; align-items: center; justify-content: center; text-align: center; padding: 10px; font-size: 0.75rem; font-weight: bold; z-index: 10; color: var(--active); }
        #success-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(13, 13, 18, 0.98); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .hex-container { position: relative; width: 200px; height: 200px; display: flex; align-items: center; justify-content: center; margin-bottom: 30px; }
        .hex-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; filter: drop-shadow(0 0 15px rgba(74, 222, 128, 0.4)); }
        .hex-text { position: absolute; z-index: 2; color: var(--success); font-weight: bold; font-size: 0.8rem; letter-spacing: 2px; text-align: center; }
        .checklist-log { text-align: left; font-size: 0.8rem; color: var(--success); opacity: 0.8; line-height: 1.8; }
        .warp-btn { margin-top: 40px; background: var(--success); color: var(--bg); border: none; padding: 15px 30px; font-weight: bold; border-radius: 4px; font-size: 0.8rem; letter-spacing: 1px; cursor: pointer; }
        .control-footer { padding: 20px; border-top: 1px solid var(--border); display: flex; justify-content: center; gap: 10px; background: var(--bg); position: absolute; bottom: 0; width: 100%; z-index: 50; }
        .mod-btn { font-size: 0.6rem; color: var(--accent); background: none; border: 1px solid var(--accent); padding: 8px 12px; border-radius: 4px; cursor: pointer; }
        .success-trigger { background: var(--accent); color: var(--bg); border: none; font-weight: bold; }
        .success-trigger:disabled { opacity: 0.2; }
    </style>
</head>
<body>
    <div id="app">
        <div id="hud">
            <span>VECTOR SYNC ACTIVE</span>
            <span onclick="confirmReset()" style="cursor:pointer; opacity:0.7">FACTORY RESET</span>
        </div>
        <div id="nav-bar">
            <div id="breadcrumb" class="breadcrumb">GALAXY</div>
            <div id="zoom-out" class="zoom-btn" style="visibility:hidden" onclick="zoomOut()">[ ZOOM OUT ]</div>
        </div>
        <div id="view-container" class="view"></div>
        <div id="control-footer" class="control-footer" style="display:none"></div>
    </div>
    <div id="success-overlay">
        <div class="hex-container">
            <svg viewBox="0 0 100 100" class="hex-svg"><polygon points="50,5 93,25 93,75 50,95 7,75 7,25" fill="none" stroke="var(--success)" stroke-width="2"/></svg>
            <div class="hex-text">MISSION<br>COMPLETE</div>
        </div>
        <div id="success-checklist" class="checklist-log"></div>
        <button class="warp-btn" onclick="hideSuccess()">WARP TO CONSTELLATION</button>
    </div>
    <script>
        const SECTORS = ['CAREER', 'FINANCIAL', 'PERSONAL', 'HEALTH'];
        const HORIZONS = ['TERMINAL', 'HORIZON', 'TRAJECTORY'];
        let state = { level: 1, sector: null, activeMissionId: null, horizon: null, missions: JSON.parse(localStorage.getItem('mc_missions') || '{}') };

        function ensurePath() {
            if (!state.missions || typeof state.missions !== 'object') state.missions = {};
            SECTORS.forEach(s => {
                if (!state.missions[s]) state.missions[s] = {};
                // Migration logic for old NOW/SOON/FUTURE keys
                if(state.missions[s].NOW) { state.missions[s].TERMINAL = state.missions[s].NOW; delete state.missions[s].NOW; }
                if(state.missions[s].SOON) { state.missions[s].HORIZON = state.missions[s].SOON; delete state.missions[s].SOON; }
                if(state.missions[s].FUTURE) { state.missions[s].TRAJECTORY = state.missions[s].FUTURE; delete state.missions[s].FUTURE; }
                HORIZONS.forEach(h => {
                    if (!state.missions[s][h]) state.missions[s][h] = [];
                    state.missions[s][h].forEach(m => {
                        if(m.x === undefined) m.x = Math.floor(Math.random() * 70) + 15;
                        if(m.y === undefined) m.y = Math.floor(Math.random() * 60) + 20;
                    });
                });
            });
            save();
        }

        function getOrbitPos(index, total, radius) {
            const angle = (index / total) * 2 * Math.PI - (Math.PI / 2); 
            const x = Math.cos(angle) * radius; const y = Math.sin(angle) * radius;
            return { x, y };
        }

        function render() {
            const container = document.getElementById('view-container');
            const zoomBtn = document.getElementById('zoom-out');
            const bread = document.getElementById('breadcrumb');
            const footer = document.getElementById('control-footer');
            container.innerHTML = ''; footer.innerHTML = '';
            zoomBtn.style.visibility = state.level > 1 ? 'visible' : 'hidden';
            bread.innerText = state.level === 1 ? 'GALAXY' : `${state.sector} ${state.horizon ? '> ' + state.horizon : ''} ${state.level === 4 ? '> TARGET' : ''}`;
            footer.style.display = 'none';

            if (state.level === 1) {
                container.innerHTML = `<div class="view-label">LEVEL 1</div><h1 class="view-title">Sector Map</h1>`;
                const grid = document.createElement('div'); grid.className = 'grid';
                SECTORS.forEach(s => { grid.innerHTML += `<div class="sector-box"><div class="planet" onclick="selectSector('${s}')">${s}</div></div>`; });
                container.appendChild(grid);
            } 
            else if (state.level === 2) {
                container.innerHTML = `<div class="view-label">LEVEL 2</div><h1 class="view-title">Planetary Map</h1>`;
                const spatial = document.createElement('div'); spatial.className = 'spatial-container';
                const centerPlanet = document.createElement('div'); centerPlanet.className = 'planet'; centerPlanet.style.position = 'absolute'; centerPlanet.style.zIndex = '50'; centerPlanet.innerText = state.sector;
                spatial.appendChild(centerPlanet);
                const ringRadii = { 'TERMINAL': 70, 'HORIZON': 120, 'TRAJECTORY': 170 };
                HORIZONS.forEach(h => {
                    const radius = ringRadii[h];
                    const ring = document.createElement('div'); ring.className = 'orbital-ring';
                    ring.style.width = `${radius * 2}px`; ring.style.height = `${radius * 2}px`;
                    ring.innerHTML = `<div class="ring-label" onclick="viewHorizon('${h}')">${h} &rsaquo;</div>`;
                    spatial.appendChild(ring);
                    const list = state.missions[state.sector][h].filter(m => !m.captured);
                    list.forEach((m, idx) => {
                        const pos = getOrbitPos(idx, list.length || 1, radius);
                        const node = document.createElement('div'); node.className = 'orbit-node';
                        node.style.left = `calc(50% + ${pos.x}px)`; node.style.top = `calc(50% + ${pos.y}px)`;
                        node.style.pointerEvents = 'none';
                        node.innerHTML = `<div class="node-circle" style="width:10px; height:10px; border-width:1px;"></div>`;
                        spatial.appendChild(node);
                    });
                });
                container.appendChild(spatial);
                footer.style.display = 'flex';
                footer.innerHTML = `<button class="zoom-btn" onclick="addMissionPrompt()">+ ADD TARGET</button>`;
            }
            else if (state.level === 3) {
                container.innerHTML = `<div class="view-label">LEVEL 3</div><h1 class="view-title">Constellation Map</h1>`;
                const spatial = document.createElement('div'); spatial.className = 'constellation-field';
                const missions = state.missions[state.sector][state.horizon];
                const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                svg.style.position = 'absolute'; svg.style.top = '0'; svg.style.left = '0'; svg.style.width = '100%'; svg.style.height = '100%'; svg.style.pointerEvents = 'none';
                spatial.appendChild(svg);
                missions.forEach((m, i) => {
                    const star = document.createElement('div'); star.className = 'orbit-node';
                    star.style.left = m.x + '%'; star.style.top = m.y + '%';
                    star.onclick = () => selectMission(m.id);
                    star.innerHTML = `<div class="node-circle ${m.captured ? 'completed' : ''}"></div><div class="node-label" style="${m.captured ? 'opacity:0.5' : ''}">${m.name}</div>`;
                    spatial.appendChild(star);
                    if (i < missions.length - 1) {
                        const next = missions[i+1];
                        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                        line.setAttribute("x1", m.x + "%"); line.setAttribute("y1", m.y + "%");
                        line.setAttribute("x2", next.x + "%"); line.setAttribute("y2", next.y + "%");
                        line.setAttribute("stroke", "var(--ring)"); line.setAttribute("stroke-width", "1"); line.setAttribute("stroke-dasharray", "4");
                        svg.appendChild(line);
                    }
                });
                container.appendChild(spatial);
                footer.style.display = 'flex';
                footer.innerHTML = `<button class="zoom-btn" onclick="addMissionDirect()">+ ADD STAR</button>`;
            }
            else if (state.level === 4) {
                container.innerHTML = `<div class="view-label">LEVEL 4</div><h1 class="view-title">Ship Orbit</h1>`;
                const activeMission = state.missions[state.sector][state.horizon].find(x => x.id === state.activeMissionId);
                if(!activeMission) { zoomOut(); return; }
                const spatial = document.createElement('div'); spatial.className = 'spatial-container';
                const subRadius = 110;
                const pathRing = document.createElement('div'); pathRing.className = 'orbital-ring';
                pathRing.style.width = `${subRadius * 2}px`; pathRing.style.height = `${subRadius * 2}px`;
                spatial.appendChild(pathRing);
                const ship = document.createElement('div'); ship.className = 'central-ship'; ship.innerText = activeMission.name;
                spatial.appendChild(ship);
                const subs = activeMission.subs; const allDone = subs.length > 0 && subs.every(s => s.c);
                subs.forEach((s, idx) => {
                    const pos = getOrbitPos(idx, subs.length || 1, subRadius);
                    const node = document.createElement('div'); node.className = 'orbit-node';
                    node.style.left = `calc(50% + ${pos.x}px)`; node.style.top = `calc(50% + ${pos.y}px)`;
                    node.onclick = () => { if(!activeMission.captured) toggleSub(idx); };
                    node.innerHTML = `<div class="node-circle ${s.c ? 'completed' : ''}"></div><div class="node-label" style="${s.c ? 'opacity:0.5; text-decoration:line-through' : ''}">${s.t}</div>`;
                    spatial.appendChild(node);
                });
                container.appendChild(spatial);
                footer.style.display = 'flex';
                if(!activeMission.captured) {
                    footer.innerHTML = `<button class="mod-btn" onclick="editMission(${activeMission.id})">MODIFY</button><button class="mod-btn success-trigger" ${allDone ? '' : 'disabled'} onclick="completeMission()">LOG SUCCESS</button>`;
                } else {
                    footer.innerHTML = `<span style="color:var(--success); font-size:0.7rem; letter-spacing:2px; display:flex; align-items:center;">MISSION ARCHIVED</span>`;
                }
            }
        }
        function toggleSub(idx) { const m = state.missions[state.sector][state.horizon].find(x => x.id === state.activeMissionId); m.subs[idx].c = !m.subs[idx].c; save(); render(); }
        function selectSector(s) { state.sector = s; state.level = 2; render(); }
        function viewHorizon(h) { state.horizon = h; state.level = 3; render(); }
        function selectMission(id) { state.activeMissionId = id; state.level = 4; render(); }
        function addMissionPrompt() { 
            const h = prompt("Which timeline? (TERMINAL, HORIZON, or TRAJECTORY)", "TERMINAL");
            if(!h || !HORIZONS.includes(h.toUpperCase())) return;
            createTask(h.toUpperCase());
        }
        function addMissionDirect() { createTask(state.horizon); }
        function createTask(h) {
            const n = prompt("Target Name?"); if(!n) return; 
            const s = prompt("Sub-tasks? (comma separated)"); 
            state.missions[state.sector][h].push({ id: Date.now(), name: n, subs: s ? s.split(',').map(t=>({t:t.trim(),c:false})) : [], captured: false, x: Math.floor(Math.random() * 70) + 15, y: Math.floor(Math.random() * 60) + 20 }); 
            save(); render(); 
        }
        function editMission(id) { 
            const m = state.missions[state.sector][state.horizon].find(x=>x.id===id); 
            const s = prompt("Modify Sub-tasks:", m.subs.map(x=>x.t).join(', ')); 
            if(s !== null) { m.subs = s.split(',').map(t=>({t:t.trim(),c:false})); }
            save(); render(); 
        }
        function completeMission() { 
            const m = state.missions[state.sector][state.horizon].find(x => x.id === state.activeMissionId);
            m.captured = true; save();
            document.getElementById('success-checklist').innerHTML = m.subs.map(s => `<div>✓ ${s.t}</div>`).join('');
            document.getElementById('success-overlay').style.display = 'flex';
        }
        function hideSuccess() { document.getElementById('success-overlay').style.display = 'none'; state.level = 3; state.activeMissionId = null; render(); }
        function zoomOut() { if (state.level === 4) state.level = 3; else if (state.level === 3) state.level = 2; else if (state.level === 2) { state.level = 1; state.sector = null; state.horizon = null; } render(); }
        function confirmReset() { if(confirm("Permanently wipe all database records?")) { localStorage.removeItem('mc_missions'); location.reload(); } }
        function save() { localStorage.setItem('mc_missions', JSON.stringify(state.missions)); }
        ensurePath(); render();
    </script>
</body>
</html>
