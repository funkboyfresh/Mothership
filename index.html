<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mission Control V4.3</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --bg: #1a1614; --accent: #d4a373; --text: #fefae0; --border: #4a4238; --captured: #606c38; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        #app { display: flex; flex-direction: column; height: 100%; }
        #hud { padding: 10px; background: rgba(0,0,0,0.6); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-size: 0.6rem; letter-spacing: 1px; color: var(--accent); }
        #nav-bar { display: flex; justify-content: space-between; padding: 10px 20px; min-height: 24px; align-items: center; z-index: 100; }
        .breadcrumb { font-size: 0.6rem; color: var(--accent); text-transform: uppercase; }
        .zoom-btn { font-size: 0.6rem; border: 1px solid var(--accent); padding: 4px 12px; border-radius: 2px; cursor: pointer; background: transparent; color: var(--accent); }
        .view { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; padding: 20px; flex-direction: column; }
        .view-level-title { font-size: 0.7rem; letter-spacing: 3px; color: var(--accent); margin-bottom: 5px; opacity: 0.8; }
        .view-main-title { font-size: 1.4rem; margin-top: 0; margin-bottom: 20px; font-weight: 300; text-transform: uppercase; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 15px; width: 100%; height: 60%; }
        .sector-box { border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; }
        .planet { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--accent); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold; }
        #constellation-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .star-container { position: absolute; display: flex; flex-direction: column; align-items: center; transform: translate(-50%, -50%); cursor: pointer; z-index: 10; }
        .star-node { width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--accent); background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 0.6rem; font-weight: bold; }
        .star-node.captured { border-color: var(--captured); box-shadow: 0 0 15px var(--captured); }
        .star-label { font-size: 0.6rem; margin-top: 6px; text-align: center; white-space: nowrap; font-weight: 300; }
        .target-lock { width: 100%; text-align: center; z-index: 10; }
        .sub-task-item { display: flex; align-items: center; padding: 18px; border-bottom: 1px solid var(--border); text-align: left; }
        .checkbox { width: 22px; height: 22px; border: 1px solid var(--accent); margin-right: 15px; flex-shrink: 0; }
        .checked { background: var(--accent); position: relative; }
        .checked::after { content: '✓'; color: var(--bg); position: absolute; left: 5px; top: 0; font-weight: bold; }
        .strikethrough { text-decoration: line-through; opacity: 0.5; }
        .success-btn { width: 100%; margin-top: 25px; padding: 20px; background: var(--accent); color: var(--bg); border: none; font-weight: bold; font-size: 0.9rem; }
        .control-footer { padding: 20px; border-top: 1px solid var(--border); display: flex; justify-content: center; background: rgba(0,0,0,0.2); }
        .mod-btn { font-size: 0.6rem; color: var(--accent); background: none; border: 1px solid var(--accent); padding: 5px 10px; border-radius: 2px; margin: 10px 5px; }
        .error-msg { color: #ae2012; font-family: monospace; font-size: 0.7rem; text-align: center; padding: 20px; }
    </style>
</head>
<body>
    <div id="app">
        <div id="hud">
            <span>STABILIZING CORE...</span>
            <span onclick="nuclearReset()" style="text-decoration:underline; cursor:pointer">WIPE ALL DATA</span>
        </div>
        <div id="nav-bar">
            <div id="breadcrumb" class="breadcrumb">GALAXY</div>
            <div id="zoom-out" class="zoom-btn" style="visibility:hidden" onclick="zoomOut()">[ ZOOM OUT ]</div>
        </div>
        <div id="view-container" class="view"></div>
        <div id="control-footer" class="control-footer" style="display:none">
            <button class="zoom-btn" onclick="addMission()">+ ADD STAR</button>
        </div>
    </div>

    <script>
        const SECTORS = ['CAREER', 'FINANCIAL', 'PERSONAL', 'HEALTH'];
        const HORIZONS = ['NOW', 'SOON', 'FUTURE'];

        let state = { level: 1, sector: null, horizon: null, activeMissionId: null, missions: {} };

        function loadState() {
            try {
                const saved = localStorage.getItem('missions');
                state.missions = (saved && saved !== "null") ? JSON.parse(saved) : {};
                ensurePath();
            } catch (e) {
                console.error("Load failed", e);
                state.missions = {};
                ensurePath();
            }
        }

        function ensurePath() {
            if (!state.missions || typeof state.missions !== 'object') state.missions = {};
            SECTORS.forEach(s => {
                if (!state.missions[s]) state.missions[s] = {};
                HORIZONS.forEach(h => {
                    if (!Array.isArray(state.missions[s][h])) state.missions[s][h] = [];
                    state.missions[s][h].forEach(m => {
                        if (m.x === undefined) m.x = Math.floor(Math.random() * 70) + 15;
                        if (m.y === undefined) m.y = Math.floor(Math.random() * 60) + 20;
                        if (m.captured === undefined) m.captured = false;
                    });
                });
            });
            save();
        }

        function save() { localStorage.setItem('missions', JSON.stringify(state.missions)); }

        function nuclearReset() {
            if (confirm("This will permanently delete all missions and reset the app. Proceed?")) {
                localStorage.clear();
                window.location.reload();
            }
        }

        function render() {
            try {
                const container = document.getElementById('view-container');
                const zoomBtn = document.getElementById('zoom-out');
                const bread = document.getElementById('breadcrumb');
                const footer = document.getElementById('control-footer');
                container.innerHTML = '';
                
                zoomBtn.style.visibility = state.level > 1 ? 'visible' : 'hidden';
                bread.innerText = `${state.sector || 'GALAXY'} ${state.horizon ? '> ' + state.horizon : ''}`;
                footer.style.display = state.level === 3 ? 'flex' : 'none';

                if (state.level === 1) {
                    container.innerHTML = `<div class="view-level-title">LEVEL 1</div><h1 class="view-main-title">Sector Map</h1>`;
                    const grid = document.createElement('div'); grid.className = 'grid';
                    SECTORS.forEach(s => {
                        const box = document.createElement('div'); box.className = 'sector-box';
                        box.innerHTML = `<div class="planet" onclick="selectSector('${s}')">${s}</div>`;
                        grid.appendChild(box);
                    });
                    container.appendChild(grid);
                } 
                else if (state.level === 2) {
                    container.innerHTML = `<div class="view-level-title">LEVEL 2 // ${state.sector}</div><h1 class="view-main-title">Planetary Map</h1>`;
                    const rings = document.createElement('div'); rings.style.width = '100%';
                    HORIZONS.forEach(h => {
                        const r = document.createElement('div');
                        r.style.padding = '25px'; r.style.border = '1px solid var(--border)'; r.style.marginBottom = '15px'; r.style.textAlign = 'center';
                        r.innerText = h; r.onclick = () => { state.horizon = h; state.level = 3; render(); };
                        rings.appendChild(r);
                    });
                    container.appendChild(rings);
                }
                else if (state.level === 3) {
                    container.innerHTML = `<div class="view-level-title">LEVEL 3 // ${state.horizon}</div><h1 class="view-main-title">Constellation Map</h1>`;
                    const missions = state.missions[state.sector][state.horizon];
                    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                    svg.id = "constellation-svg";
                    container.appendChild(svg);
                    missions.forEach((m, i) => {
                        const star = document.createElement('div'); star.className = 'star-container';
                        star.style.left = m.x + '%'; star.style.top = m.y + '%';
                        star.onclick = () => selectMission(m.id);
                        star.innerHTML = `<div class="star-node ${m.captured ? 'captured' : ''}">${i+1}</div><div class="star-label">${m.name}</div>`;
                        container.appendChild(star);
                        if (i < missions.length - 1) {
                            const next = missions[i+1];
                            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                            line.setAttribute("x1", m.x + "%"); line.setAttribute("y1", m.y + "%");
                            line.setAttribute("x2", next.x + "%"); line.setAttribute("y2", next.y + "%");
                            line.setAttribute("stroke", "var(--border)"); line.setAttribute("stroke-width", "1"); line.setAttribute("stroke-dasharray", "4");
                            svg.appendChild(line);
                        }
                    });
                }
                else if (state.level === 4) {
                    const m = state.missions[state.sector][state.horizon].find(x => x.id === state.activeMissionId);
                    const allDone = m.subs.length > 0 && m.subs.every(s => s.c);
                    container.innerHTML = `<div class="target-lock">
                        <div class="view-level-title">LEVEL 4 // ${m.captured ? 'MISSION LOG' : 'ACTIVE TARGET'}</div>
                        <h1 class="view-main-title">Ship Orbit</h1><h2 style="color:var(--accent); font-size: 1rem;">${m.name}</h2>
                        <div style="max-height: 40vh; overflow-y: auto;">
                            ${m.subs.map((s, i) => `<div class="sub-task-item" onclick="${m.captured ? '' : `toggleSub(${i}, event)`}"><div class="checkbox ${s.c ? 'checked' : ''}"></div><span class="${s.c ? 'strikethrough' : ''}">${s.t}</span></div>`).join('')}
                        </div>
                        ${!m.captured ? `<button class="success-btn ${allDone ? '' : 'disabled'}" onclick="completeMission()">LOG SUCCESS & WARP</button>` : ''}
                        <div style="margin-top:10px">
                            <button class="mod-btn" onclick="editMission(${m.id}, event, true)">EDIT SUBS</button>
                            <button class="mod-btn" onclick="deleteMission(${m.id}, event)" style="color:red; border-color:red">DESTROY</button>
                        </div>
                    </div>`;
                }
            } catch (err) {
                document.getElementById('view-container').innerHTML = `<div class="error-msg">SYSTEM CRASH: ${err.message}<br><br>Hit 'WIPE ALL DATA' in the HUD to reset.</div>`;
            }
        }

        function selectSector(s) { state.sector = s; state.level = 2; render(); }
        function selectMission(id) { state.activeMissionId = id; state.level = 4; render(); }
        function toggleSub(index, e) { e.stopPropagation(); const m = state.missions[state.sector][state.horizon].find(x => x.id === state.activeMissionId); m.subs[index].c = !m.subs[index].c; save(); render(); }
        function completeMission() { const m = state.missions[state.sector][state.horizon].find(x => x.id === state.activeMissionId); m.captured = true; save(); state.level = 3; state.activeMissionId = null; render(); }
        function addMission() {
            const name = prompt("Mission Name?"); if(!name) return;
            const subsInput = prompt("Sub-missions? (comma separated)");
            const subs = subsInput ? subsInput.split(',').filter(t => t.trim() !== "").map(t => ({t: t.trim(), c: false})) : [];
            state.missions[state.sector][state.horizon].push({ id: Date.now(), name, subs, x: Math.floor(Math.random() * 70) + 15, y: Math.floor(Math.random() * 50) + 25, captured: false });
            save(); render();
        }
        function editMission(id, e, focusSub) {
            if(e) e.stopPropagation();
            const m = state.missions[state.sector][state.horizon].find(x => x.id === id);
            const res = prompt("Modify Sub-missions:", m.subs.map(s => s.t).join(', '));
            if(res !== null) {
                const names = res.split(',').map(t => t.trim()).filter(t => t !== "");
                m.subs = names.map(n => { const ex = m.subs.find(s => s.t === n); return ex ? {t: ex.t, c: ex.c} : {t: n, c: false}; });
            }
            save(); render();
        }
        function deleteMission(id, e) { if(e) e.stopPropagation(); if(confirm("Destroy?")) { state.missions[state.sector][state.horizon] = state.missions[state.sector][state.horizon].filter(m => m.id !== id); save(); state.level = 3; state.activeMissionId = null; render(); } }
        function zoomOut() { if (state.level === 4) state.level = 3; else if (state.level === 3) state.level = 2; else if (state.level === 2) { state.level = 1; state.sector = null; } render(); }

        loadState();
        render();
    </script>
</body>
</html>
