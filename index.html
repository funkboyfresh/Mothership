<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mission Control</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg: #1a1614; /* High Desert Night */
            --accent: #d4a373; /* Sandstone */
            --text: #fefae0; /* Bone */
            --border: #4a4238;
            --ring-now: #bc6c25;
            --ring-soon: #dda15e;
            --ring-far: #606c38;
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        #app { display: flex; flex-direction: column; height: 100%; }

        /* HUD */
        #hud {
            padding: 15px; background: rgba(0,0,0,0.4);
            border-bottom: 1px solid var(--border);
            text-align: center; font-size: 0.8rem; letter-spacing: 2px;
        }

        /* Nav/Breadcrumbs */
        #nav { padding: 10px; font-size: 0.7rem; color: var(--accent); cursor: pointer; }

        /* Levels */
        .view { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        
        /* Level 1: Sector Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 10px; width: 90%; height: 80%; }
        .sector { border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; position: relative; }
        .planet { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--accent); display: flex; align-items: center; justify-content: center; font-size: 0.6rem; text-align: center; }

        /* Level 4: Target Lock */
        .target-lock { text-align: center; width: 100%; }
        .central-node { 
            width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--accent);
            margin: 0 auto 30px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(212, 163, 115, 0.3);
        }
        .sub-tasks { list-style: none; padding: 0; }
        .sub-tasks li { padding: 15px; border-bottom: 1px solid var(--border); width: 80%; margin: 0 auto; text-align: left; }
        
        .success-btn {
            margin-top: 30px; padding: 20px; background: var(--accent); color: var(--bg);
            border: none; font-weight: bold; letter-spacing: 1px; border-radius: 4px;
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="hud">WARNING: INCOMING TASKS</div>
        <div id="nav" onclick="goBack()">[ ZOOM OUT ]</div>
        <div id="view-container" class="view"></div>
    </div>

    <script>
        let currentLevel = 1;
        let selectedSector = null;
        let selectedTask = null;

        const sectors = ['CAREER', 'FINANCIAL', 'PERSONAL', 'HEALTH'];

        function render() {
            const container = document.getElementById('view-container');
            container.innerHTML = '';

            if (currentLevel === 1) {
                const grid = document.createElement('div');
                grid.className = 'grid';
                sectors.forEach(s => {
                    const div = document.createElement('div');
                    div.className = 'sector';
                    div.innerHTML = `<div class="planet" onclick="selectSector('${s}')">${s}</div>`;
                    grid.appendChild(div);
                });
                container.appendChild(grid);
            } else if (currentLevel === 4) {
                container.innerHTML = `
                    <div class="target-lock">
                        <div class="central-node">${selectedTask}</div>
                        <ul class="sub-tasks">
                            <li>[ ] Finalize feasibility data</li>
                            <li>[ ] Run massing variations</li>
                            <li>[ ] Apply West Texas Modern textures</li>
                        </ul>
                        <button class="success-btn" onclick="goBack()">LOG SUCCESS & WARP</button>
                    </div>
                `;
            } else {
                container.innerHTML = `<div onclick="currentLevel = 4; render();">Entering ${selectedSector} Orbit... <br>(Touch to initiate Target Lock)</div>`;
            }
        }

        function selectSector(s) {
            selectedSector = s;
            selectedTask = s === 'FINANCIAL' ? 'DEBT AVALANCHE' : 'GENERAL TASK';
            currentLevel = 2;
            render();
        }

        function goBack() {
            if (currentLevel > 1) currentLevel--;
            render();
        }

        render();
    </script>
</body>
</html>
