<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mission Control V4.0</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --bg: #1a1614; --accent: #d4a373; --text: #fefae0; --border: #4a4238; --captured: #606c38; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        #app { display: flex; flex-direction: column; height: 100%; }
        #hud { padding: 15px; background: rgba(0,0,0,0.4); border-bottom: 1px solid var(--border); text-align: center; font-size: 0.7rem; letter-spacing: 2px; color: var(--accent); }
        #nav-bar { display: flex; justify-content: space-between; padding: 10px; min-height: 24px; align-items: center; z-index: 10; }
        .breadcrumb { font-size: 0.6rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        .zoom-btn { font-size: 0.6rem; border: 1px solid var(--accent); padding: 4px 10px; border-radius: 2px; cursor: pointer; background: transparent; color: var(--accent); }
        .view { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; padding: 20px; flex-direction: column; }
        
        .view-level-title { font-size: 0.7rem; letter-spacing: 3px; color: var(--accent); margin-bottom: 5px; opacity: 0.8; z-index: 5; }
        .view-main-title { font-size: 1.4rem; margin-top: 0; margin-bottom: 20px; font-weight: 300; text-transform: uppercase; z-index: 5; }

        /* Level 1: Sector Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 15px; width: 100%; height: 60%; z-index: 5; }
        .sector-box { border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; }
        .planet { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--accent); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold; text-align: center; }

        /* Level 3: Constellation Map */
        #constellation-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .star-container { position: absolute; display: flex; flex-direction: column; align-items: center; transform: translate(-50%, -50%); cursor: pointer; z-index: 10; }
        .star-node { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--accent); background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 0.5rem; transition: all 0.3s; }
        .star-node.captured { border-color: var(--captured); box-shadow: 0 0 15px var(--captured); }
        .star-label { font-size: 0.6rem; margin-top: 5px; text-align: center; white-space: nowrap; max-width: 80px; overflow: hidden; text-overflow: ellipsis; }
        .captured-banner { font-size: 0.4rem; color: var(--captured); letter-spacing: 1px; margin-top: 2px; font-weight: bold; }

        /* Level 4: Target Lock */
        .target-lock { width: 100%; text-align: center; z-index: 5; }
        .sub-task-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid var(--border); text-align: left; }
        .checkbox { width: 22px; height: 22px; border: 1px solid var(--accent); margin-right: 15px; flex-shrink: 0; }
        .checked { background: var(--accent); position: relative; }
        .checked::after { content: '✓'; color: var(--bg); position: absolute; left: 5px; top: 0; font-weight: bold; }
        .strikethrough { text-decoration: line-through; opacity: 0.5; }
        .success-btn { width: 100%; margin-top: 20px; padding: 20px; background: var(--accent); color: var(--bg); border: none; font-weight: bold; font-size: 0.9rem; }
        .mod-btn { margin-top: 15px; font-size: 0.6rem; color: var(--accent); text-decoration: underline; background: none; border: none; }
        .disabled { opacity: 0.3; pointer-events: none; }
    </style>
</head>
<body>
    <div id="app">
        <div id="hud">CONSTELLATION MAPPING ACTIVE</div>
        <div id="nav-bar">
            <div id="breadcrumb" class="breadcrumb"></div>
            <div id="zoom-out" class="zoom-btn" style="display:none" onclick="zoomOut()">[ ZOOM OUT ]</div>
        </div>
        <div id="view-container" class="view"></div>
    </div>

    <script>
        let state = {
            level: 1, sector: null, horizon: null, activeMissionId: null,
            missions: JSON.parse(localStorage.getItem('missions')) || {
                CAREER: { NOW: [], SOON: [], FUTURE: [] },
                FINANCIAL: { NOW: [], SOON: [], FUTURE: [] },
                PERSONAL: { NOW: [], SOON: [], FUTURE: [] },
                HEALTH: { NOW: [], SOON: [], FUTURE: [] }
            }
        };

        function save() { localStorage.setItem('missions', JSON.stringify(state.missions)); }

        function render() {
            const container = document.getElementById('view-container');
            const zoomBtn = document.getElementById('zoom-out');
            const bread = document.getElementById('breadcrumb');
            container.innerHTML = '';
            
            zoomBtn.style.display = state.level > 1 ? 'block' : 'none';
            bread.innerText = `${state.sector || ''} ${state.horizon ? '> ' + state.horizon : ''}`;

            if (state.level === 1) {
                container.innerHTML = `<div class="view-level-title">LEVEL 1</div><h1 class="view-main-title">Sector Map</h1>`;
                const grid = document.createElement('div'); grid.className = 'grid';
                Object.keys(state.missions).forEach(s => {
                    const box = document.createElement('div'); box.className = 'sector-box';
                    box.innerHTML = `<div class="planet" onclick="selectSector('${s}')">${s}</div>`;
                    grid.appendChild(box);
                });
                container.appendChild(grid);
            } 
            else if (state.level === 2) {
                container.innerHTML = `<div class="view-level-title">LEVEL 2 // ${state.sector}</div><h1 class="view-main-title">Planetary Map</h1>`;
                const rings = document.createElement('div'); rings.style.width = '80%';
                ['NOW', 'SOON', 'FUTURE'].forEach(h => {
                    const r = document.createElement('div');
                    r.style.padding = '20px'; r.style.border = '1px solid var(--border)'; r.style.marginBottom = '10px'; r.style.textAlign = 'center';
                    r.innerText = h;
                    r.onclick = () => { state.horizon = h; state.level = 3; render(); };
                    rings.appendChild(r);
                });
                container.appendChild(rings);
            }
            else if (state.level === 3) {
                container.innerHTML = `<div class="view-level-title">LEVEL 3 // ${state.horizon}</div><h1 class="view-main-title">Constellation Map</h1>`;
                const missions = state.missions[state.sector][state.horizon];
                
                // SVG for lines
                const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                svg.id = "constellation-svg";
                container.appendChild(svg);

                missions.forEach((m, i) => {
                    const star = document.createElement('div');
                    star.className = 'star-container';
                    star.style.left = m.x + '%';
                    star.style.top = m.y + '%';
                    star.onclick = () => selectMission(m.id);
                    
                    star.innerHTML = `
                        <div class="star-node ${m.captured ? 'captured' : ''}">${i+1}</div>
                        <div class="star-label">${m.name}</div>
                        ${m.captured ? '<div class="captured-banner">STAR CAPTURED</div>' : ''}
                    `;
                    container.appendChild(star);

                    // Draw line to next star
                    if (i < missions.length - 1) {
                        const next = missions[i+1];
                        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                        line.setAttribute("x1", m.x + "%");
                        line.setAttribute("y1", m.y + "%");
                        line.setAttribute("x2", next.x + "%");
                        line.setAttribute("y2", next.y + "%");
                        line.setAttribute("stroke", "var(--border)");
                        line.setAttribute("stroke-width", "1");
                        line.setAttribute("stroke-dasharray", "4");
                        svg.appendChild(line);
                    }
                });

                const addBtn = document.createElement('button');
                addBtn.className = 'zoom-btn';
                addBtn.style.position = 'absolute'; addBtn.style.bottom = '20px';
                addBtn.innerText = '+ ADD STAR';
                addBtn.onclick = addMission;
                container.appendChild(addBtn);
            }
            else if (state.level === 4) {
                const m = state.missions[state.sector][state.horizon].find(x => x.id === state.activeMissionId);
                const allDone = m.subs.length > 0 && m.subs.every(s => s.c);
                container.innerHTML = `
                    <div class="target-lock">
                        <div class="view-level-title">LEVEL 4 // ${m.captured ? 'MISSION LOG' : 'ACTIVE TARGET'}</div>
                        <h1 class="view-main-title">Ship Orbit</h1>
                        <h2 style="color:var(--accent); font-size: 1.1rem; margin-bottom: 25px;">${m.name}</h2>
                        ${m.subs.map((s, i) => `
                            <div class="sub-task-item" onclick="${m.captured ? '' : `toggleSub(${i}, event)`}">
                                <div class="checkbox ${s.c ? 'checked' : ''}"></div>
                                <span class="${s.c ? 'strikethrough' : ''}">${s.t}</span>
                            </div>
                        `).join('')}
                        ${!m.captured ? `<button class="success-btn ${allDone ? '' : 'disabled'}" onclick="completeMission()">LOG MISSION SUCCESS & WARP</button>` : '<div class="captured-banner" style="font-size:1rem; margin-top:20px">MISSION ARCHIVED</div>'}
                        <button class="mod-btn" onclick="editMission(${m.id}, event, true)">[ MODIFY PARAMETERS ]</button>
                    </div>`;
            }
        }

        function selectSector(s) { state.sector = s; state.level = 2; render(); }
        function selectMission(id) { state.activeMissionId = id; state.level = 4; render(); }
        function toggleSub(index, e) {
            e.stopPropagation();
            const m = state.missions[state.sector][state.horizon].find(x => x.id === state.activeMissionId);
            m.subs[index].c = !m.subs[index].c;
            save(); render();
        }
        function completeMission() {
            const m = state.missions[state.sector][state.horizon].find(x => x.id === state.activeMissionId);
            m.captured = true;
            save(); state.level = 3; state.activeMissionId = null; render();
        }
        function addMission() {
            const name = prompt("Mission Name?"); if(!name) return;
            const subsInput = prompt("Sub-missions? (comma separated)");
            const subs = subsInput ? subsInput.split(',').filter(t => t.trim() !== "").map(t => ({t: t.trim(), c: false})) : [];
            // Randomly position between 15% and 85% to stay in view
            const x = Math.floor(Math.random() * 70) + 15;
            const y = Math.floor(Math.random() * 60) + 20;
            state.missions[state.sector][state.horizon].push({ id: Date.now(), name, subs, x, y, captured: false });
            save(); render();
        }
        function editMission(id, e, focusSubtasks = false) {
            if(e) e.stopPropagation();
            const m = state.missions[state.sector][state.horizon].find(x => x.id === id);
            if(!focusSubtasks) m.name = prompt("Mission Name:", m.name) || m.name;
            const newSubs = prompt("Modify Sub-missions:", m.subs.map(s => s.t).join(', '));
            if (newSubs !== null) {
                const names = newSubs.split(',').map(t => t.trim()).filter(t => t !== "");
                m.subs = names.map(n => {
                    const ex = m.subs.find(s => s.t === n);
                    return ex ? {t: ex.t, c: ex.c} : {t: n, c: false};
                });
            }
            save(); render();
        }
        function zoomOut() { 
            if (state.level === 4) { state.activeMissionId = null; state.level = 3; }
            else if (state.level === 3) state.level = 2;
            else if (state.level === 2) { state.level = 1; state.sector = null; }
            render(); 
        }

        render();
    </script>
</body>
</html>
