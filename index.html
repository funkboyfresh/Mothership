<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mission Control V8.0</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { 
            --bg: #0a0a0a; 
            --text: #ffffff; 
            --border: #333333; 
            --accent: #00e5ff; 
            --accent-glow: rgba(0, 229, 255, 0.6); 
            --captured: var(--accent); 
            --thrust: #ff2a2a; 
        }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, sans-serif; height: 100vh; overflow: hidden; transition: all 0.5s ease; }
        #app { display: flex; flex-direction: column; height: 100%; }
        
        #hud { padding: 15px; background: rgba(0,0,0,0.8); border-bottom: 1px solid var(--border); text-align: center; font-size: 0.7rem; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; text-shadow: 0 0 10px var(--accent-glow); transition: color 0.5s, text-shadow 0.5s; z-index: 200; position: relative; }
        .hud-warning { color: var(--thrust) !important; text-shadow: 0 0 15px var(--thrust) !important; animation: flash-warning 1.5s infinite; }
        @keyframes flash-warning { 0%, 100% { background: rgba(255, 42, 42, 0.1); } 50% { background: rgba(0, 0, 0, 0.8); } }

        #nav-bar { display: flex; justify-content: space-between; padding: 10px 20px; min-height: 24px; align-items: center; z-index: 100; }
        .breadcrumb { font-size: 0.6rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; text-shadow: 0 0 8px var(--accent-glow); }
        .zoom-btn { font-size: 0.6rem; border: 1px solid var(--accent); padding: 4px 12px; border-radius: 2px; cursor: pointer; background: rgba(0,0,0,0.5); color: var(--accent); text-transform: uppercase; box-shadow: 0 0 10px var(--accent-glow); transition: all 0.3s; }
        .zoom-btn:active { background: var(--accent); color: var(--bg); }
        .view { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; padding: 20px; flex-direction: column; }
        
        @keyframes warp-drive { 0% { opacity: 0; transform: scale(0.8); filter: blur(4px); } 100% { opacity: 1; transform: scale(1); filter: blur(0); } }
        .warp-transition { animation: warp-drive 0.35s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

        .view-level-title { font-size: 0.7rem; letter-spacing: 3px; color: var(--accent); margin-bottom: 5px; opacity: 0.8; z-index: 5; text-shadow: 0 0 8px var(--accent-glow); }
        .view-main-title { font-size: 1.4rem; margin-top: 0; margin-bottom: 20px; font-weight: 300; text-transform: uppercase; z-index: 5; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 20px; width: 100%; max-width: 400px; height: 60%; z-index: 5; margin: 0 auto; }
        .sector-box { border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.02); border-radius: 8px; transition: all 0.3s; }
        .planet { width: 100px; height: 100px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold; position: relative; cursor: pointer; }
        .mini-ring { position: absolute; border-radius: 50%; border: 1px dashed rgba(255,255,255,0.2); pointer-events: none; }

        .ring-circle { position: absolute; border-radius: 50%; border: 1px solid var(--accent); display: flex; justify-content: center; box-sizing: border-box; cursor: pointer; background: rgba(0, 0, 0, 0.2); font-size: 0.7rem; letter-spacing: 2px; color: var(--text); box-shadow: 0 0 20px var(--accent-glow) inset, 0 0 20px var(--accent-glow); transition: background 0.2s; z-index: 2; }
        .ring-circle:active { background: rgba(255, 255, 255, 0.1); }
        .ring-label { position: absolute; top: 10px; text-shadow: 0 0 8px var(--accent); }

        /* Particle System */
        .particle { position: absolute; border-radius: 50%; background: var(--accent); box-shadow: 0 0 5px var(--accent-glow); pointer-events: none; animation: float-particle linear infinite alternate; }
        @keyframes float-particle { 0% { transform: scale(0.8) translate(0, 0); opacity: 0.2; } 100% { transform: scale(1.2) translate(10px, -10px); opacity: 0.8; } }

        #constellation-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .star-container { position: absolute; display: flex; flex-direction: column; align-items: center; transform: translate(-50%, -50%); cursor: pointer; z-index: 10; transition: left 0.3s, top 0.3s; }
        
        /* Orbital Decay Physics */
        @keyframes drift-decay {
            0% { transform: translate(-50%, -50%) rotate(0deg) translate(0px, 0px); }
            25% { transform: translate(-50%, -50%) rotate(2deg) translate(4px, 6px); }
            50% { transform: translate(-50%, -50%) rotate(-1deg) translate(-5px, -3px); }
            75% { transform: translate(-50%, -50%) rotate(3deg) translate(6px, -2px); }
            100% { transform: translate(-50%, -50%) rotate(0deg) translate(0px, 0px); }
        }
        .star-container.decaying { animation: drift-decay 0.8s infinite; z-index: 15; }
        .star-node.decaying { border-color: var(--thrust); box-shadow: 0 0 20px var(--thrust); color: var(--thrust); }
        .star-label.decaying { color: var(--thrust); text-shadow: 0 0 5px rgba(255, 42, 42, 0.8); }

        .star-node { width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--accent); background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 0.6rem; font-weight: bold; box-shadow: 0 0 15px var(--accent-glow); }
        .star-node.captured { background: var(--accent); color: var(--bg); }
        .star-label { font-size: 0.6rem; margin-top: 6px; text-align: center; white-space: nowrap; font-weight: 300; text-shadow: 0 0 5px rgba(0,0,0,0.8); }
        .captured-banner { font-size: 0.4rem; color: var(--accent); letter-spacing: 1px; margin-top: 2px; font-weight: bold; text-shadow: 0 0 5px var(--accent-glow); }

        .target-lock { width: 100%; text-align: center; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        
        .progress-wrapper { width: 90%; max-width: 400px; margin: 0 auto 15px auto; border: 1px solid var(--accent); padding: 4px; background: rgba(0,0,0,0.6); border-radius: 4px; z-index: 20; box-shadow: 0 0 15px var(--accent-glow); }
        .progress-bar-container { width: 100%; height: 12px; background: #222; position: relative; overflow: hidden; display: flex; border-radius: 2px; }
        .progress-fill { height: 100%; background: var(--accent); transition: width 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); box-shadow: 0 0 15px var(--accent); }
        .progress-text { font-size: 0.65rem; color: var(--accent); letter-spacing: 1px; margin-top: 5px; text-align: right; font-weight: bold; text-shadow: 0 0 5px var(--accent-glow); }

        @keyframes orbit-spin { 100% { transform: rotate(360deg); } }
        @keyframes orbit-counter-spin { 100% { transform: rotate(-360deg); } }
        @keyframes core-ignition { 0% { r: 14; fill: var(--bg); filter: drop-shadow(0 0 0px transparent); } 50% { r: 22; fill: var(--thrust); filter: drop-shadow(0 0 25px var(--thrust)); } 100% { r: 14; fill: var(--bg); filter: drop-shadow(0 0 0px transparent); } }
        @keyframes pulse-hex { 0% { filter: drop-shadow(0 0 15px var(--accent-glow)); } 50% { filter: drop-shadow(0 0 40px var(--accent)); } 100% { filter: drop-shadow(0 0 15px var(--accent-glow)); } }

        .orbital-system { width: 340px; height: 340px; position: relative; margin: 10px auto; animation: orbit-spin 60s linear infinite; flex-shrink: 0; }
        .counter-spin { animation: orbit-counter-spin 60s linear infinite; }
        .flare-active { animation: core-ignition 0.6s ease-out; }
        
        .orbital-node-box { background: rgba(10, 10, 10, 0.95); border: 1px solid var(--accent); padding: 8px 12px; border-radius: 4px; display: flex; align-items: center; gap: 8px; white-space: nowrap; max-width: 140px; transition: all 0.3s; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .orbital-node-box.checked { background: rgba(255,255,255,0.05); box-shadow: 0 0 15px var(--accent-glow); }
        .orb-check { width: 14px; height: 14px; border: 1px solid var(--accent); display:flex; align-items:center; justify-content:center; font-size: 0.5rem; flex-shrink: 0; color: var(--bg); transition: all 0.3s; box-shadow: 0 0 5px var(--accent-glow);}
        .orbital-node-box.checked .orb-check { background: var(--accent); }
        .orb-text { font-size: 0.55rem; overflow: hidden; text-overflow: ellipsis; white-space: pre-wrap; text-align: left; line-height: 1.2; text-shadow: 0 0 5px rgba(0,0,0,0.8); }
        
        .hex-modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(10px); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .hex-container { position: relative; width: 160px; height: 180px; display: flex; align-items: center; justify-content: center; margin-bottom: 30px; animation: pulse-hex 2s infinite; }
        .hex-shape { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--accent); clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); opacity: 0.4; }
        .hex-inner { position: absolute; top: 4px; left: 4px; width: calc(100% - 8px); height: calc(100% - 8px); background: var(--bg); clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); display: flex; align-items: center; justify-content: center; z-index: 2; border: 1px solid var(--accent); }
        .hex-icon { font-size: 3.5rem; color: var(--accent); font-weight: bold; text-shadow: 0 0 15px var(--accent-glow); }
        
        .success-btn { width: 80%; max-width: 300px; padding: 20px; background: var(--accent); color: var(--bg); border: none; font-weight: bold; font-size: 1rem; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; box-shadow: 0 0 25px var(--accent-glow); border-radius: 4px; transition: transform 0.1s; }
        .success-btn:active { transform: scale(0.96); }
        
        .control-footer { padding: 20px; border-top: 1px solid var(--border); display: flex; justify-content: center; background: rgba(0,0,0,0.6); width: 100%; box-sizing: border-box; }
        .mod-btn { font-size: 0.6rem; color: var(--accent); background: rgba(0,0,0,0.5); border: 1px solid var(--accent); padding: 8px 14px; border-radius: 2px; margin: 0 5px; cursor: pointer; transition: all 0.2s; box-shadow: 0 0 8px var(--accent-glow); }
        .mod-btn:hover { background: var(--accent); color: var(--bg); }
    </style>
</head>
<body>
    <div id="app">
        <div id="hud">SYSTEM ARCHITECTURE NOMINAL</div>
        <div id="nav-bar">
            <div id="breadcrumb" class="breadcrumb">GALAXY</div>
            <div id="zoom-out" class="zoom-btn" style="visibility:hidden" onclick="zoomOut()">[ ZOOM OUT ]</div>
        </div>
        <div id="view-container" class="view"></div>
        <div id="control-footer" class="control-footer" style="display:none">
            <button class="zoom-btn" style="font-size: 0.8rem; padding: 10px 20px;" onclick="addMission()">+ INITIALIZE STAR</button>
        </div>
    </div>

    <script>
        const SECTORS = ['CAREER', 'FINANCIAL', 'PERSONAL', 'HEALTH'];
        const HORIZONS = ['FAR', 'NEAR', 'NOW'];
        const SECTOR_COLORS = { 'CAREER': '#00e5ff', 'FINANCIAL': '#ffd700', 'PERSONAL': '#ff00ff', 'HEALTH': '#00ff88' };

        let state = {
            level: 1, sector: null, horizon: null, activeMissionId: null,
            missions: JSON.parse(localStorage.getItem('missions')) || {}
        };

        let ignitionFlare = false;

        function updateAccentColor() {
            const hex = state.sector ? SECTOR_COLORS[state.sector] : '#00e5ff';
            document.documentElement.style.setProperty('--accent', hex);
            
            let c;
            if(/^#([A-Fa-f0-9]{3}){1,2}$/.test(hex)){
                c= hex.substring(1).split('');
                if(c.length== 3){c= [c[0], c[0], c[1], c[1], c[2], c[2]];}
                c= '0x'+c.join('');
                const rgba = 'rgba('+[(c>>16)&255, (c>>8)&255, c&255].join(',')+',0.6)';
                document.documentElement.style.setProperty('--accent-glow', rgba);
            }
        }

        function ensurePath() {
            SECTORS.forEach(s => {
                if (!state.missions[s]) state.missions[s] = {};
                
                // MIGRATION PROTOCOL: Shift old tags to new system
                if (state.missions[s]['SOON']) { state.missions[s]['NEAR'] = state.missions[s]['SOON']; delete state.missions[s]['SOON']; }
                if (state.missions[s]['FUTURE']) { state.missions[s]['FAR'] = state.missions[s]['FUTURE']; delete state.missions[s]['FUTURE']; }

                HORIZONS.forEach(h => {
                    if (!state.missions[s][h]) state.missions[s][h] = [];
                    state.missions[s][h].forEach(m => {
                        if (m.x === undefined) m.x = Math.floor(Math.random() * 70) + 15;
                        if (m.y === undefined) m.y = Math.floor(Math.random() * 60) + 20;
                        if (m.captured === undefined) m.captured = false;
                        if (m.overdue === undefined) m.overdue = false; // Initialize decay state
                    });
                });
            });
            save();
        }

        function save() { localStorage.setItem('missions', JSON.stringify(state.missions)); }

        function triggerWarp() {
            const container = document.getElementById('view-container');
            container.classList.remove('warp-transition');
            void container.offsetWidth; 
            container.classList.add('warp-transition');
        }

        function checkDecayStatus() {
            let hasDecay = false;
            Object.keys(state.missions).forEach(s => {
                HORIZONS.forEach(h => {
                    if(state.missions[s][h]) {
                        state.missions[s][h].forEach(m => {
                            if (m.overdue && !m.captured) hasDecay = true;
                        });
                    }
                });
            });
            const hud = document.getElementById('hud');
            if (hasDecay) {
                hud.innerText = "WARNING: ORBITAL DECAY DETECTED";
                hud.classList.add('hud-warning');
            } else {
                hud.innerText = "SYSTEM ARCHITECTURE NOMINAL";
                hud.classList.remove('hud-warning');
            }
        }

        function render() {
            updateAccentColor();
            ensurePath();
            checkDecayStatus();
            
            const container = document.getElementById('view-container');
            const zoomBtn = document.getElementById('zoom-out');
            const bread = document.getElementById('breadcrumb');
            const footer = document.getElementById('control-footer');
            
            triggerWarp();
            container.innerHTML = '';
            
            zoomBtn.style.visibility = state.level > 1 ? 'visible' : 'hidden';
            bread.innerText = `${state.sector || 'GALAXY'} ${state.horizon ? '> ' + state.horizon : ''}`;
            footer.style.display = state.level === 3 ? 'flex' : 'none';

            if (state.level === 1) {
                container.innerHTML = `<div class="view-level-title">LEVEL 1</div><h1 class="view-main-title">Sector Map</h1>`;
                const grid = document.createElement('div'); grid.className = 'grid';
                SECTORS.forEach(s => {
                    const cHex = SECTOR_COLORS[s];
                    const box = document.createElement('div'); box.className = 'sector-box';
                    
                    let planetHtml = `<div class="planet" onclick="selectSector('${s}')" style="border-color: ${cHex}; box-shadow: 0 0 20px ${cHex}66; color: ${cHex}; text-shadow: 0 0 8px ${cHex};">
                        <div style="z-index: 5;">${s}</div>
                        <div class="mini-ring" style="width: 80px; height: 80px; animation: orbit-spin 10s linear infinite;"></div>
                        <div class="mini-ring" style="width: 60px; height: 60px; animation: orbit-counter-spin 15s linear infinite;"></div>
                        <div class="mini-ring" style="width: 40px; height: 40px; animation: orbit-spin 20s linear infinite;"></div>
                    </div>`;
                    
                    box.innerHTML = planetHtml;
                    grid.appendChild(box);
                });
                container.appendChild(grid);
            } 
            else if (state.level === 2) {
                container.innerHTML = `<div class="view-level-title">LEVEL 2 // ${state.sector}</div><h1 class="view-main-title">Planetary Map</h1>`;
                const center = document.createElement('div');
                center.style.position = 'relative'; center.style.width = '280px'; center.style.height = '280px';
                center.style.display = 'flex'; center.style.alignItems = 'center'; center.style.justifyContent = 'center'; center.style.marginTop = '20px';
                
                // Procedural Radial Gradient Glow
                center.style.background = 'radial-gradient(circle at center, var(--accent-glow) 0%, transparent 70%)';
                center.style.borderRadius = '50%';

                // Particle Engine
                const particleSystem = document.createElement('div');
                particleSystem.style.position = 'absolute'; particleSystem.style.width = '100%'; particleSystem.style.height = '100%'; particleSystem.style.pointerEvents = 'none'; particleSystem.style.zIndex = '1';
                for(let i=0; i<80; i++) {
                    const p = document.createElement('div'); p.className = 'particle';
                    const radius = Math.pow(Math.random(), 2) * 160; 
                    const angle = Math.random() * Math.PI * 2;
                    const x = 140 + radius * Math.cos(angle); 
                    const y = 140 + radius * Math.sin(angle);
                    const size = Math.random() * 2 + 1;
                    p.style.width = size + 'px'; p.style.height = size + 'px';
                    p.style.left = x + 'px'; p.style.top = y + 'px';
                    p.style.animationDuration = (Math.random() * 3 + 1.5) + 's';
                    p.style.animationDelay = (Math.random() * 2) + 's';
                    particleSystem.appendChild(p);
                }
                center.appendChild(particleSystem);
                
                const h_data = [ 
                    { id: 'FAR', size: 280, speed: 60 }, 
                    { id: 'NEAR', size: 190, speed: 30 }, 
                    { id: 'NOW', size: 100, speed: 15 } 
                ];
                
                h_data.forEach(d => {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'ring-circle';
                    wrapper.style.width = d.size + 'px'; 
                    wrapper.style.height = d.size + 'px';
                    wrapper.onclick = (e) => { e.stopPropagation(); state.horizon = d.id; state.level = 3; render(); };
                    
                    const label = document.createElement('div');
                    label.className = 'ring-label';
                    label.innerText = d.id;
                    wrapper.appendChild(label);

                    const starField = document.createElement('div');
                    starField.style.position = 'absolute'; starField.style.width = '100%'; starField.style.height = '100%';
                    starField.style.animation = `orbit-spin ${d.speed}s linear infinite`; starField.style.pointerEvents = 'none';

                    const missions = state.missions[state.sector][d.id] || [];
                    missions.forEach((m, i) => {
                        const angle = (i / missions.length) * Math.PI * 2;
                        const radius = d.size / 2;
                        const x = radius + radius * Math.cos(angle);
                        const y = radius + radius * Math.sin(angle);
                        
                        const dot = document.createElement('div');
                        dot.style.position = 'absolute'; dot.style.width = '6px'; dot.style.height = '6px';
                        dot.style.backgroundColor = m.overdue && !m.captured ? 'var(--thrust)' : 'var(--accent)';
                        dot.style.borderRadius = '50%';
                        dot.style.boxShadow = m.overdue && !m.captured ? '0 0 10px var(--thrust)' : '0 0 8px var(--accent-glow)';
                        dot.style.left = `calc(${x}px - 3px)`; dot.style.top = `calc(${y}px - 3px)`;
                        starField.appendChild(dot);
                    });

                    wrapper.appendChild(starField);
                    center.appendChild(wrapper);
                });
                container.appendChild(center);
            }
            else if (state.level === 3) {
                container.innerHTML = `<div class="view-level-title">LEVEL 3 // ${state.horizon}</div><h1 class="view-main-title">Constellation Map</h1>`;
                const missions = state.missions[state.sector][state.horizon];
                if (missions.length === 0) {
                    container.innerHTML += `<div style="margin-top: 60px; font-size: 0.8rem; color: var(--border); letter-spacing: 2px;">NO ARCHITECTURE DETECTED IN ${state.horizon} ORBIT</div>`;
                } else {
                    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg"); svg.id = "constellation-svg"; container.appendChild(svg);
                    missions.forEach((m, i) => {
                        const decayClass = m.overdue && !m.captured ? 'decaying' : '';
                        const star = document.createElement('div'); 
                        star.className = `star-container ${decayClass}`;
                        star.style.left = m.x + '%'; star.style.top = m.y + '%'; star.onclick = () => selectMission(m.id);
                        star.innerHTML = `<div class="star-node ${m.captured ? 'captured' : ''} ${decayClass}">${i+1}</div><div class="star-label ${decayClass}">${m.name}</div>${m.captured ? '<div class="captured-banner">TARGET ACQUIRED</div>' : ''}`;
                        container.appendChild(star);
                        if (i < missions.length - 1) {
                            const next = missions[i+1];
                            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                            line.setAttribute("x1", m.x + "%"); line.setAttribute("y1", m.y + "%"); line.setAttribute("x2", next.x + "%"); line.setAttribute("y2", next.y + "%");
                            line.setAttribute("stroke", "var(--accent)"); line.setAttribute("stroke-width", "1"); line.setAttribute("stroke-dasharray", "4"); line.style.opacity = "0.5";
                            svg.appendChild(line);
                        }
                    });
                }
            }
            else if (state.level === 4) {
                const m = state.missions[state.sector][state.horizon].find(x => x.id === state.activeMissionId);
                const totalTasks = m.subs.length;
                const completedTasks = m.subs.filter(s => s.c).length;
                const progressPercent = totalTasks === 0 ? 0 : Math.round((completedTasks / totalTasks) * 100);
                const allDone = totalTasks > 0 && completedTasks === totalTasks;
                
                const coreClass = ignitionFlare ? 'flare-active' : '';
                ignitionFlare = false;
                const coreFill = allDone ? 'var(--accent)' : 'var(--bg)';
                const titleColor = m.overdue && !m.captured ? 'var(--thrust)' : 'var(--text)';
                
                let orbHtml = `<div class="target-lock">
                    <div class="view-level-title" style="color: ${m.overdue && !m.captured ? 'var(--thrust)' : ''}">LEVEL 4 // ${m.captured ? 'MISSION LOG' : (m.overdue ? 'DECAYING TARGET' : 'ACTIVE TARGET')}</div>
                    <h2 style="color:${titleColor}; font-size: 1.2rem; margin-top: 0; margin-bottom: 15px; z-index:20; font-weight:400; text-shadow: 0 0 10px rgba(255,255,255,0.2);">${m.name}</h2>
                    
                    <div class="progress-wrapper">
                        <div class="progress-bar-container">
                            <div class="progress-fill" style="width: ${progressPercent}%;"></div>
                        </div>
                        <div class="progress-text">${progressPercent}% INTEGRITY</div>
                    </div>

                    <div class="orbital-system">
                        <svg viewBox="0 0 340 340" style="position:absolute; top:0; left:0; width:100%; height:100%; z-index: 1;">
                            <g stroke="var(--accent)" stroke-width="1.5" fill="none" style="filter: drop-shadow(0 0 5px var(--accent-glow));">
                                <polygon points="170,70 230,220 170,190 110,220" />
                                <polygon points="170,110 200,200 170,180 140,200" fill="rgba(255, 255, 255, 0.05)" />
                                <circle id="ship-core" class="${coreClass}" cx="170" cy="170" r="14" fill="${coreFill}" stroke-width="2" style="transition: fill 0.5s"/>
                                <circle cx="170" cy="170" r="4" fill="var(--accent)"/>
                            </g>
                        `;

                const shipParts = [ {x: 170, y: 70}, {x: 230, y: 220}, {x: 110, y: 220}, {x: 170, y: 190}, {x: 200, y: 200}, {x: 140, y: 200} ];

                m.subs.forEach((s, i) => {
                    const angle = (i / m.subs.length) * Math.PI * 2;
                    const radius = 100 + (i % 2) * 45;
                    const taskX = 170 + radius * Math.cos(angle);
                    const taskY = 170 + radius * Math.sin(angle);
                    const part = shipParts[i % shipParts.length];
                    const lineColor = s.c ? 'var(--accent)' : 'var(--border)';
                    const dashArray = s.c ? '0' : '4';
                    orbHtml += `<line x1="${taskX}" y1="${taskY}" x2="${part.x}" y2="${part.y}" stroke="${lineColor}" stroke-dasharray="${dashArray}" stroke-width="1.5" style="transition: all 0.3s; filter: drop-shadow(0 0 5px ${s.c ? 'var(--accent-glow)' : 'transparent'});" />`;
                });

                orbHtml += `</svg>`;

                m.subs.forEach((s, i) => {
                    const angle = (i / m.subs.length) * Math.PI * 2;
                    const radius = 100 + (i % 2) * 45;
                    const taskX = 170 + radius * Math.cos(angle);
                    const taskY = 170 + radius * Math.sin(angle);

                    orbHtml += `
                        <div style="position:absolute; left:${taskX}px; top:${taskY}px; transform:translate(-50%, -50%); z-index:20; cursor:pointer;" onclick="${m.captured ? '' : `toggleSub(${i}, event)`}">
                            <div class="counter-spin orbital-node-box ${s.c ? 'checked' : ''}">
                                <div class="orb-check">${s.c ? '✓' : ''}</div>
                                <div class="orb-text ${s.c ? 'strikethrough' : ''}">${s.t}</div>
                            </div>
                        </div>`;
                });

                orbHtml += `</div>`; 

                if (allDone && !m.captured) {
                    orbHtml += `
                        <div class="hex-modal warp-transition">
                            <div class="hex-container">
                                <div class="hex-shape"></div>
                                <div class="hex-inner">
                                    <div class="hex-icon">✓</div>
                                </div>
                            </div>
                            <h2 style="color: var(--accent); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 40px; text-align: center; font-weight: 300; text-shadow: 0 0 15px var(--accent-glow);">Target<br>Secured</h2>
                            <button class="success-btn" onclick="completeMission()">Log Mission & Warp</button>
                        </div>`;
                } else if (m.captured) {
                    orbHtml += `<div class="captured-banner" style="font-size:1rem; padding: 15px; color: var(--border);">MISSION ARCHIVED</div>`;
                }
                
                orbHtml += `
                    <div style="display:flex; justify-content:center; margin-top: auto; padding-bottom: 20px; z-index: 10;">
                        <button class="mod-btn" onclick="editMission(${m.id}, event, 'sub')">PARAMETERS</button>
                        <button class="mod-btn" onclick="editMission(${m.id}, event, 'status')" style="${m.overdue && !m.captured ? 'color: var(--thrust); border-color: var(--thrust); box-shadow: 0 0 8px rgba(255,42,42,0.4);' : ''}">STATUS</button>
                        <button class="mod-btn" onclick="deleteMission(${m.id}, event)" style="color:#ff2a2a; border-color:#ff2a2a; box-shadow: 0 0 8px rgba(255, 42, 42, 0.4);">DESTROY</button>
                    </div>
                </div>`;

                container.innerHTML = orbHtml;
            }
        }

        function addMission() {
            const name = prompt("Mission Name?"); if(!name) return;
            const subsInput = prompt("Sub-missions? (comma separated)");
            const subs = subsInput ? subsInput.split(',').filter(t => t.trim() !== "").map(t => ({t: t.trim(), c: false})) : [];
            const x = Math.floor(Math.random() * 70) + 15;
            const y = Math.floor(Math.random() * 50) + 25;
            state.missions[state.sector][state.horizon].push({ id: Date.now(), name, subs, x, y, captured: false, overdue: false });
            save(); render();
        }

        function selectSector(s) { state.sector = s; state.level = 2; render(); }
        function selectMission(id) { state.activeMissionId = id; state.level = 4; render(); }
        
        function toggleSub(index, e) {
            e.stopPropagation();
            const m = state.missions[state.sector][state.horizon].find(x => x.id === state.activeMissionId);
            m.subs[index].c = !m.subs[index].c;
            if(m.subs[index].c) ignitionFlare = true;
            save(); render();
        }
        
        function completeMission() {
            const m = state.missions[state.sector][state.horizon].find(x => x.id === state.activeMissionId);
            m.captured = true;
            m.overdue = false; // clear decay on capture
            save(); state.level = 3; state.activeMissionId = null; render();
        }
        
        function editMission(id, e, actionType) {
            if(e) e.stopPropagation();
            const m = state.missions[state.sector][state.horizon].find(x => x.id === id);
            
            if(actionType === 'sub') {
                const current = m.subs.map(s => s.t).join(', ');
                const res = prompt("Modify Sub-missions:", current);
                if(res !== null) {
                    const names = res.split(',').map(t => t.trim()).filter(t => t !== "");
                    m.subs = names.map(n => {
                        const ex = m.subs.find(s => s.t === n);
                        return ex ? {t: ex.t, c: ex.c} : {t: n, c: false};
                    });
                }
            } else if (actionType === 'status') {
                const decayToggle = confirm("WARNING: Toggle Orbital Decay / Overdue Status?");
                if (decayToggle) m.overdue = !m.overdue;
                if (!decayToggle) {
                    const res = prompt("Rename Mission:", m.name);
                    if(res) m.name = res;
                }
            }
            save(); render();
        }
        
        function deleteMission(id, e) {
            if(e) e.stopPropagation();
            if(confirm("Destroy this target permanently?")) {
                state.missions[state.sector][state.horizon] = state.missions[state.sector][state.horizon].filter(m => m.id !== id);
                save(); state.level = 3; state.activeMissionId = null; render();
            }
        }
        
        function zoomOut() { 
            if (state.level === 4) { state.activeMissionId = null; state.level = 3; }
            else if (state.level === 3) { state.level = 2; state.horizon = null; } 
            else if (state.level === 2) { state.level = 1; state.sector = null; }
            render(); 
        }

        render();
    </script>
</body>
</html>
