<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONSTELLATION // PILOT INTERFACE</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
</head>
<body>
    <div id="app">
        <div id="global-starfield" class="starfield"></div>
        
        <div id="hud-top">
            <div class="hud-left">
                <div id="breadcrumb">GALAXY</div>
                <button id="zoom-out" onclick="zoomOut()">[ ZOOM OUT ]</button>
            </div>
            <div class="hud-right">
                <div id="hud-level">PILOT LEVEL 1</div>
                <div id="hud-energy-readout">CAPACITOR 0%</div>
                <div class="hud-capacitor-shell">
                    <div id="hud-capacitor-bar"></div>
                </div>
            </div>
        </div>

        <main id="view-container">
            </main>

        <footer id="control-footer">
            </footer>

        <div class="settings-trigger" onclick="openSettingsModal()">⚙</div>

        <div id="task-modal-overlay" class="modal-overlay">
            <div class="modal-box">
                <div class="modal-header">INITIALIZE TARGET</div>
                
                <div class="modal-group">
                    <label>MISSION NAME</label>
                    <input type="text" id="modal-task-name" class="modal-input" placeholder="ENTER MISSION DESIGNATION...">
                </div>

                <div class="modal-group" id="modal-horizon-group">
                    <label>HORIZON SELECTION</label>
                    <select id="modal-horizon-select" class="modal-input">
                        <option value="IMMINENT">IMMINENT</option>
                        <option value="HORIZON">HORIZON</option>
                        <option value="TRAJECTORY">TRAJECTORY</option>
                    </select>
                </div>

                <div style="display: flex; gap: 15px;">
                    <div class="modal-group" style="flex: 1;">
                        <label>TEMPORAL DATE</label>
                        <input type="date" id="modal-task-date" class="modal-input">
                    </div>
                    <div class="modal-group" style="flex: 1;">
                        <label>TEMPORAL TIME</label>
                        <input type="time" id="modal-task-time" class="modal-input">
                    </div>
                </div>

                <div class="modal-group">
                    <label>SUB-ROUTINES</label>
                    <div id="modal-subtasks-list">
                        </div>
                    <button id="modal-add-subtask-btn" class="mod-btn" onclick="addModalSubtask()">+ ADD ROUTINE</button>
                </div>

                <div style="margin-top: 20px; display: flex; flex-direction: column; gap: 10px;">
                    <button class="success-btn" onclick="saveTaskModal()">LOCK TARGET</button>
                    <button class="mod-btn" style="border-color: rgba(255,255,255,0.2);" onclick="closeTaskModal()">CANCEL</button>
                </div>
            </div>
        </div>

        <div id="sector-modal-overlay" class="modal-overlay">
            <div class="modal-box">
                <div class="modal-header">GALAXY SECTORS</div>
                <div id="sector-edit-list" class="subtasks-container">
                    </div>
                <button id="sector-add-btn" class="mod-btn" style="width: 100%; margin-top: 10px;" onclick="addNewSector()">+ ADD NEW SECTOR</button>
                <button class="success-btn" style="width: 100%; margin-top: 20px;" onclick="saveSectorModal()">SAVE CONFIGURATION</button>
                <button class="mod-btn" style="width: 100%; border-color: rgba(255,255,255,0.2);" onclick="closeSectorModal()">CANCEL</button>
            </div>
        </div>

        <div id="settings-modal-overlay" class="modal-overlay">
            <div class="modal-box" style="max-width: 300px;">
                <div class="modal-header">SYSTEM SETTINGS</div>
                <div class="modal-group" style="display: flex; justify-content: space-between; align-items: center;">
                    <label>HAPTIC FEEDBACK</label>
                    <input type="checkbox" id="settings-haptics-toggle">
                </div>
                <div style="margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
                    <button class="mod-btn factory-reset-btn" style="width: 100%; color: var(--thrust);" onclick="factoryReset()">FACTORY RESET</button>
                </div>
                <button class="success-btn" style="width: 100%; margin-top: 10px;" onclick="closeSettingsModal()">DISMISS</button>
            </div>
        </div>

        <div id="level-up-overlay">
            <div class="hyper-drive-text">HYPERDRIVE ACTIVE</div>
            <div class="hyper-drive-sub">PILOT LEVEL INCREASED</div>
        </div>
    </div>

    <script src="engine.js"></script>
</body>
</html>
